<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Borges - Simulador Apê 3D Inteligente</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0b0b0b; font-family: 'Outfit', sans-serif; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index: 1; }
        
        /* Interface Noir do Painel Borges */
        .painel-lateral {
            position: absolute; top: 20px; left: 20px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 255, 136, 0.2);
            z-index: 10; width: 310px; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        }
        h5 { margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; color: #00ff88; text-transform: uppercase; }
        subtitle { font-size: 0.75rem; color: #888; display: block; margin-bottom: 15px; text-transform: uppercase; }
        
        .secao { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .secao-titulo { font-size: 0.8rem; font-weight: bold; color: #00ff88; margin-bottom: 8px; text-transform: uppercase; }
        
        .comodo-tag {
            font-size: 0.72rem; font-weight: bold; padding: 5px 8px; border-radius: 4px;
            background: rgba(255,255,255,0.04); display: block; margin-bottom: 6px; border-left: 3px solid #00ff88;
        }
        .regra-limpeza {
            background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.2);
            padding: 8px; border-radius: 6px; font-size: 0.72rem; color: #ff6b6b; margin-top: 5px;
        }

        label { display: block; font-size: 0.72rem; color: #aaa; margin: 6px 0 2px 0; text-transform: uppercase; }
        select, input, button {
            width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #333;
            color: #fff; border-radius: 6px; font-size: 0.8rem; margin-bottom: 5px; transition: 0.2s;
        }
        select:focus, input:focus { border-color: #00ff88; outline: none; }
        
        button.btn-primary { background: #00ff88; color: #000; font-weight: bold; border: none; cursor: pointer; }
        button.btn-primary:hover { background: #00cc6c; box-shadow: 0 0 12px rgba(0,255,136,0.4); }
        button.btn-danger { background: #ff3b30; color: white; border: none; cursor: pointer; }
        button.btn-danger:hover { background: #d63025; }
        
        .flex-group { display: table; width: 100%; }
        .flex-cell { display: table-cell; width: 33.33%; padding: 2px; }

        .painel-lateral::-webkit-scrollbar { width: 6px; }
        .painel-lateral::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .painel-lateral::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="painel-lateral">
        <h5>⚙️ CONSTRUTOR 3D</h5>
        <subtitle>Mapeamento de Planejados</subtitle>
        
        <div class="comodo-tag">📐 Layout Dinâmico Integrado</div>
        <div class="comodo-tag">🧼 Regra: Tudo Suspenso do Chão</div>
        <div class="regra-limpeza"><strong>Regra de Ouro:</strong> Vão livre inferior na Cozinha e Área.</div>

        <div class="secao" style="margin-top:12px;">
            <div class="secao-titulo">➕ Novo Elemento</div>
            <label>Tipo</label>
            <select id="novoTipo">
                <option value="parede">🧱 Parede Estrutural</option>
                <option value="armario">🗄️ Armário Suspenso</option>
                <option value="cama">🛏️ Cama Planejada</option>
                <option value="recurso">🚰 Item/Eletro (Pia, Gás, TV)</option>
            </select>
            <label>Identificação do Objeto</label>
            <input type="text" id="novoNome" placeholder="Ex: Balcão da Pia Cozinha">
            <button class="btn-primary" onclick="criarNovoObjetoNoBanco()">Adicionar ao Apê</button>
        </div>

        <div class="secao" id="painelEdicao" style="display:none;">
            <div class="secao-titulo" id="edicaoTitulo">📝 Editando: Nenhum</div>
            
            <label>Dimensões (Largura | Altura | Profundidade)</label>
            <div class="flex-group">
                <div class="flex-cell"><input type="number" id="dimL" step="0.05" oninput="atualizarObjetoSelecionado()"></div>
                <div class="flex-cell"><input type="number" id="dimA" step="0.05" oninput="atualizarObjetoSelecionado()"></div>
                <div class="flex-cell"><input type="number" id="dimP" step="0.05" oninput="atualizarObjetoSelecionado()"></div>
            </div>

            <label>Posicionamento (X | Altura Y | Z)</label>
            <div class="flex-group">
                <div class="flex-cell"><input type="number" id="posX" step="0.05" oninput="atualizarObjetoSelecionado()"></div>
                <div class="flex-cell"><input type="number" id="posY" step="0.05" oninput="atualizarObjetoSelecionado()"></div>
                <div class="flex-cell"><input type="number" id="posZ" step="0.05" oninput="atualizarObjetoSelecionado()"></div>
            </div>
            
            <label>Ângulo / Rotação Y</label>
            <select id="rotY" onchange="atualizarObjetoSelecionado()">
                <option value="0">0° (Horizontal Padrão)</option>
                <option value="1.5708">90° (Rotacionado 90°)</option>
                <option value="3.1416">180°</option>
                <option value="4.7124">270°</option>
            </select>

            <button class="btn-primary" style="margin-top:10px;" onclick="salvarAlteracoesNoBanco()">💾 Salvar Definitivo</button>
            <button class="btn-danger" style="margin-top:5px;" onclick="deletarObjetoDoBanco()">🗑️ Remover Elemento</button>
        </div>
        
        <div class="secao">
            <div class="secao-titulo">📋 Objetos no Cenário</div>
            <select id="listaObjetosCenario" size="5" onchange="selecionarObjetoPorLista(this.value)"></select>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // CONFIGURAÇÃO FIRESTORE BORGES
        const firebaseConfig = {
            apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8",
            authDomain: "painel-financeiro-borges.firebaseapp.com",
            projectId: "painel-financeiro-borges",
            storageBucket: "painel-financeiro-borges.firebasestorage.app",
            messagingSenderId: "354997627208",
            appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const colecaoApartamento = db.collection("layout_apartamento");

        // AMBIENTE THREE.JS
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(luzAmbiente);
        const luzDirecional = new THREE.DirectionalLight(0xfffaed, 0.7);
        luzDirecional.position.set(10, 15, 10);
        scene.add(luzDirecional);

        const grid = new THREE.GridHelper(30, 30, 0x00ff88, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        const materiais = {
            parede: new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.6 }),
            armario: new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.4 }),
            cama: new THREE.MeshStandardMaterial({ color: 0x1f3a60, roughness: 0.5 }),
            recurso: new THREE.MeshStandardMaterial({ color: 0x7f8c8d, metalness: 0.6, roughness: 0.2 })
        };

        let objetos3DLocais = {}; 
        let idObjetoSelecionado = null;

        // Chão Físico do Apê
        const chaoGeo = new THREE.BoxGeometry(20, 0.05, 16);
        const chaoMat = new THREE.MeshStandardMaterial({ color: 0x1a1512, roughness: 0.7 });
        const chaoMesh = new THREE.Mesh(chaoGeo, chaoMat);
        chaoMesh.position.set(0, -0.025, 0);
        scene.add(chaoMesh);

        // SINCRONIZAÇÃO TRATADA CONTRA ERROS DE TIPO (STRINGS)
        colecaoApartamento.onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                const dados = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added" || change.type === "modified") {
                    if (objetos3DLocais[id]) {
                        scene.remove(objetos3DLocais[id]);
                    }

                    // Força a conversão para Float para evitar quebras de renderização gráfica
                    const l = parseFloat(dados.largura) || 1.0;
                    const a = parseFloat(dados.altura) || 1.0;
                    const p = parseFloat(dados.profundidade) || 1.0;
                    const x = parseFloat(dados.posX) || 0;
                    const y = parseFloat(dados.posY) || 0;
                    const z = parseFloat(dados.posZ) || 0;
                    const r = parseFloat(dados.rotY) || 0;

                    const geo = new THREE.BoxGeometry(l, a, p);
                    const mat = materiais[dados.tipo] || materiais.parede;
                    const mesh = new THREE.Mesh(geo, mat);
                    
                    mesh.position.set(x, y, z);
                    mesh.rotation.y = r;
                    mesh.userData = { id: id };

                    scene.add(mesh);
                    objetos3DLocais[id] = mesh;
                }
                
                if (change.type === "removed") {
                    if (objetos3DLocais[id]) {
                        scene.remove(objetos3DLocais[id]);
                        delete objetos3DLocais[id];
                    }
                }
            });
            atualizarInterfaceListagem();
        });

        function atualizarInterfaceListagem() {
            const selectList = document.getElementById("listaObjetosCenario");
            selectList.innerHTML = "";
            colecaoApartamento.get().then(snapshot => {
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const option = document.createElement("option");
                    option.value = doc.id;
                    option.text = `[${d.tipo.toUpperCase()}] ${d.nome}`;
                    selectList.appendChild(option);
                });
            });
        }

        function criarNovoObjetoNoBanco() {
            const nome = document.getElementById("novoNome").value || "Objeto Novo";
            const tipo = document.getElementById("novoTipo").value;
            
            const novoDoc = {
                nome: nome,
                tipo: tipo,
                largura: tipo === "parede" ? 3.0 : 1.0,
                altura: tipo === "parede" ? 2.8 : 0.6,
                profundidade: tipo === "parede" ? 0.2 : 0.5,
                posX: 0,
                posY: tipo === "parede" ? 1.4 : 0.8, // Armário já nasce suspenso a 80cm do chão
                posZ: 0,
                rotY: 0
            };

            colecaoApartamento.add(novoDoc).then(docRef => {
                document.getElementById("novoNome").value = "";
                selecionarObjetoPorLista(docRef.id);
            });
        }

        function selecionarObjetoPorLista(id) {
            idObjetoSelecionado = id;
            colecaoApartamento.doc(id).get().then(doc => {
                if (doc.exists) {
                    const d = doc.data();
                    document.getElementById("painelEdicao").style.display = "block";
                    document.getElementById("edicaoTitulo").innerText = `📝 Editando: ${d.nome}`;
                    
                    document.getElementById("dimL").value = d.largura;
                    document.getElementById("dimA").value = d.altura;
                    document.getElementById("dimP").value = d.profundidade;
                    
                    document.getElementById("posX").value = d.posX;
                    document.getElementById("posY").value = d.posY;
                    document.getElementById("posZ").value = d.posZ;
                    document.getElementById("rotY").value = d.rotY || 0;
                }
            });
        }

        function atualizarObjetoSelecionado() {
            if (!idObjetoSelecionado || !objetos3DLocais[idObjetoSelecionado]) return;

            const l = parseFloat(document.getElementById("dimL").value) || 1;
            const a = parseFloat(document.getElementById("dimA").value) || 1;
            const p = parseFloat(document.getElementById("dimP").value) || 1;
            const x = parseFloat(document.getElementById("posX").value) || 0;
            const y = parseFloat(document.getElementById("posY").value) || 0;
            const z = parseFloat(document.getElementById("posZ").value) || 0;
            const rot = parseFloat(document.getElementById("rotY").value) || 0;

            const mesh = objetos3DLocais[idObjetoSelecionado];
            mesh.geometry.dispose();
            mesh.geometry = new THREE.BoxGeometry(l, a, p);
            mesh.position.set(x, y, z);
            mesh.rotation.y = rot;
        }

        function salvarAlteracoesNoBanco() {
            if (!idObjetoSelecionado) return;

            const updateDoc = {
                largura: parseFloat(document.getElementById("dimL").value),
                altura: parseFloat(document.getElementById("dimA").value),
                profundidade: parseFloat(document.getElementById("dimP").value),
                posX: parseFloat(document.getElementById("posX").value),
                posY: parseFloat(document.getElementById("posY").value),
                posZ: parseFloat(document.getElementById("posZ").value),
                rotY: parseFloat(document.getElementById("rotY").value)
            };

            colecaoApartamento.doc(idObjetoSelecionado).update(updateDoc).then(() => {
                alert("Alterações salvas com sucesso!");
            });
        }

        function deletarObjetoDoBanco() {
            if (!idObjetoSelecionado) return;
            if (confirm("Remover este item do cenário?")) {
                colecaoApartamento.doc(idObjetoSelecionado).delete().then(() => {
                    document.getElementById("painelEdicao").style.display = "none";
                    idObjetoSelecionado = null;
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
