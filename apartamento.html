<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Apartamento</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; font-family: 'Outfit', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        .painel-controle {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            color: white; z-index: 10; width: 220px;
        }
        .painel-controle h5 { margin: 0 0 10px 0; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; color: #00ff88; }
        .btn-add {
            width: 100%; padding: 8px; background: #222; border: 1px solid #444;
            color: #fff; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-add:hover { background: #00ff88; color: #000; border-color: #00ff88; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="painel-controle">
        <h5>🔨 Construtor do Apê</h5>
        <p style="font-size: 0.8rem; margin-bottom: 12px; color: #aaa;">Arraste com o mouse para girar e use o scroll para dar zoom.</p>
        <button class="btn-add" onclick="adicionarParedeExemplo()">+ Nova Parede</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. CONFIGURAÇÃO DO CENÁRIO ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x141414); // Fundo escuro/Noir

        // Câmera posicionada de cima e na diagonal (Perspectiva Isométrica)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 10, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Habilita sombras reais
        container.appendChild(renderer.domElement);

        // Controles de câmera por mouse (Clique esquerdo gira, direito arrasta, scroll da zoom)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Impede a câmera de ir para baixo do chão

        // --- 2. ILUMINAÇÃO REFINADA ---
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(luzAmbiente);

        const luzDirecional = new THREE.DirectionalLight(0xffffff, 0.8);
        luzDirecional.position.set(10, 18, 10);
        luzDirecional.castShadow = true;
        luzDirecional.shadow.mapSize.width = 2048;
        luzDirecional.shadow.mapSize.height = 2048;
        scene.add(luzDirecional);

        // --- 3. CONSTRUINDO O APARTAMENTO (Ir adicionando na mão) ---

        // Exemplo: O Chão da Sala/Geral (Largura, Altura/Espessura, Profundidade)
        const chaoGeo = new THREE.BoxGeometry(16, 0.1, 14);
        const chaoMat = new THREE.MeshStandardMaterial({ color: 0x2e241f, roughness: 0.4 }); // Tom amadeirado escuro
        const chao = new THREE.Mesh(chaoGeo, chaoMat);
        chao.receiveShadow = true;
        scene.add(chao);

        // Grade de referência para te ajudar a alinhar as paredes na mão (Grid)
        const gridHelper = new THREE.GridHelper(30, 30, 0x00ff88, 0x333333);
        gridHelper.position.y = 0.06;
        scene.add(gridHelper);

        // Função utilitária para criar paredes rapidamente no código
        function criarParede(largura, altura, profundidade, x, y, z, rotacaY = 0) {
            const paredeGeo = new THREE.BoxGeometry(largura, altura, profundidade);
            const paredeMat = new THREE.MeshStandardMaterial({ color: 0xdedede, roughness: 0.6 });
            const parede = new THREE.Mesh(paredeGeo, paredeMat);
            parede.castShadow = true;
            parede.receiveShadow = true;
            
            parede.position.set(x, y, z);
            parede.rotation.y = rotacaY;
            
            scene.add(parede);
            return parede;
        }

        // --- Monte as paredes do seu apê alterando as coordenadas aqui: ---
        // Sintaxe: criarParede(largura, altura, espessura, X, Y, Z, rotação)
        
        // Parede de Fundo (Exemplo)
        criarParede(16, 3, 0.2, 0, 1.5, -7); 
        
        // Parede Lateral Esquerda (Rotacionada em 90 graus: Math.PI / 2)
        criarParede(14, 3, 0.2, -8, 1.5, 0, Math.PI / 2);

        // Parede Interna (Divisória de cômodo de exemplo)
        criarParede(6, 3, 0.2, -2, 1.5, 2);


        // --- 4. FUNÇÃO INTERATIVA DE EXEMPLO ---
        function adicionarParedeExemplo() {
            // Cria uma parede dinâmica via botão no centro do grid para você testar
            criarParede(3, 3, 0.2, 0, 1.5, 0);
        }

        // --- 5. LOOP DE RENDERIZAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Ajusta a tela caso mude o tamanho do navegador/iframe
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
