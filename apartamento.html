<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Borges - Simulador Apê Térreo V7</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #090909; font-family: 'Outfit', sans-serif; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; z-index: 1; }
        
        .painel-lateral {
            position: absolute; top: 20px; left: 20px;
            background: rgba(12, 12, 12, 0.95); backdrop-filter: blur(16px);
            padding: 18px; border-radius: 16px; border: 1px solid rgba(0, 255, 136, 0.25);
            z-index: 10; width: 335px; max-height: 95vh; overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        h5 { margin: 0 0 3px 0; font-size: 1.15rem; font-weight: 900; color: #00ff88; letter-spacing: 0.5px; text-transform: uppercase; }
        subtitle { font-size: 0.72rem; color: #777; display: block; margin-bottom: 12px; text-transform: uppercase; }
        
        .secao { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.04); }
        .secao-titulo { font-size: 0.75rem; font-weight: bold; color: #00ff88; margin-bottom: 6px; text-transform: uppercase; }
        
        .controles-ferramenta { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-modo { flex: 1; padding: 6px; font-size: 0.72rem; font-weight: bold; background: #222; border: 1px solid #444; color: #aaa; border-radius: 4px; cursor: pointer; text-transform: uppercase;}
        .btn-modo.ativo { background: #00ff88; color: #000; border-color: #00ff88; }

        .instrucoes { background: rgba(0, 255, 136, 0.05); border-left: 3px solid #00ff88; padding: 8px; border-radius: 4px; font-size: 0.7rem; color: #bbb; margin-bottom: 10px; line-height: 1.3; }
        
        .botoes-zoom { display: flex; gap: 6px; margin-bottom: 10px; }
        .btn-zoom { flex: 1; padding: 10px; background: #111; border: 1px solid #00ff88; color: #00ff88; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .btn-zoom:hover { background: #00ff88; color: #000; }

        label { display: block; font-size: 0.68rem; color: #999; margin: 5px 0 2px 0; text-transform: uppercase; }
        select, input, button, textarea {
            width: 100%; padding: 7px; background: #141414; border: 1px solid #2a2a2a;
            color: #fff; border-radius: 5px; font-size: 0.78rem; margin-bottom: 4px;
        }
        textarea { font-family: monospace; font-size: 0.7rem; resize: vertical; }
        
        button.btn-primary { background: #00ff88; color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.75rem;}
        button.btn-primary:hover { background: #00cc6c; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
        button.btn-danger { background: #ff3b30; color: white; border: none; cursor: pointer; font-size: 0.72rem; font-weight: bold; text-transform: uppercase; }
        button.btn-clear-all { background: #e74c3c; color: white; border: none; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; padding: 10px; }
        button.btn-clear-all:hover { background: #c0392b; }
        
        .lista-items { size: 3; background: #111; color: #ccc; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
</head>
<body>

    <div class="painel-lateral">
        <h5>🛠️ SIMULADOR BORGES V7</h5>
        <subtitle>Mapeamento Térreo Sem Trava de Escala</subtitle>
        
        <div class="instrucoes">
            <strong>Botões de Zoom Ativos:</strong> Perfeito para quem está sem scroll de mouse.
        </div>

        <div class="botoes-zoom">
            <button class="btn-zoom" onclick="controlarZoomManual(0.85)">➕ APROXIMAR</button>
            <button class="btn-zoom" onclick="controlarZoomManual(1.15)">➖ AFASTAR</button>
        </div>

        <button class="btn-clear-all" onclick="limparTodoOCenarioDoAp()">💥 Limpar Todo o Cenário</button>

        <div class="controles-ferramenta">
            <button id="modoMover" class="btn-modo ativo" onclick="mudarModoGizmo('translate')">↔️ MOVER</button>
            <button id="modoRedim" class="btn-modo" onclick="mudarModoGizmo('scale')">📐 ESTICAR</button>
        </div>

        <div class="secao">
            <div class="secao-titulo">➕ Inserir Objeto Avançado</div>
            <select id="novoTipo">
                <optgroup label="Estrutura e Alvenaria">
                    <option value="parede">🧱 Parede Alvenaria</option>
                    <option value="quintal">🪵 Piso da Área Privativa Externa</option>
                    <option value="porta">🚪 Porta de Passagem</option>
                    <option value="janela">🪟 Janela / Vão de Luz</option>
                </optgroup>
                <optgroup label="Cozinha Sob Medida">
                    <option value="pia">🚰 Bancada da Pia Suspensa</option>
                    <option value="armario">🗄️ Armários Superiores Aéreos</option>
                    <option value="galao">📦 Cubo Ocultador do Galão de Água</option>
                    <option value="cooktop">🔥 Cooktop Embutido</option>
                </optgroup>
                <optgroup label="Área Externa / Quintal">
                    <option value="gas">⛽ Casinha do Gás Blindada</option>
                    <option value="lavadora">🧺 Máquina de Lavar e Tanque</option>
                    <option value="armariotool">🧰 Armário Suspenso p/ Ferramentas</option>
                    <option value="portao">🚧 Portão de Fechamento</option>
                </optgroup>
                <optgroup label="Quartos & Sala Inteligente">
                    <option value="closetcabide">👔 Closet Planejado (Apenas Cabides)</option>
                    <option value="camaduplex">🛏️ Cama Duplex</option>
                    <option value="paineltv">📺 Painel Amadeirado Ripado TV</option>
                    <option value="lustre">💡 Lustre de teto</option>
                </optgroup>
            </select>
            <input type="text" id="novoNome" placeholder="Nome ex: Parede Principal">
            <button class="btn-primary" onclick="criarNovoObjetoNoBanco()">Colocar no Cenário</button>
        </div>

        <div class="secao" id="painelEdicao" style="display:none;">
            <div class="secao-titulo" id="edicaoTitulo">📝 Selecionado: Nenhum</div>
            <label>Girar Elemento</label>
            <select id="rotY" onchange="atualizarRotacaoLocal()">
                <option value="0">0° (Padrão)</option>
                <option value="1.5708">90° (Rotacionado)</option>
                <option value="3.1416">180°</option>
                <option value="4.7124">270°</option>
            </select>
            <button class="btn-primary" style="margin-top:5px;" onclick="salvarAlteracoesNoBanco()">💾 Fixar Alterações</button>
            <button class="btn-danger" style="margin-top:3px;" onclick="deletarObjetoDoBanco()">🗑️ Remover Item</button>
        </div>
        
        <div class="secao">
            <div class="secao-titulo">📋 Carga Rápida de Layout</div>
            <textarea id="txtImportar" rows="3" placeholder="Cole o código do layout aqui..."></textarea>
            <button class="btn-primary" style="background:#00ffd2; color:#000;" onclick="executarImportacaoEmMassa()">📥 Redefinir Todo Cenário para o Padrão Coletado</button>
        </div>

        <div class="secao">
            <div class="secao-titulo">📋 Objetos Ativos no Apê</div>
            <select id="listaObjetosCenario" class="lista-items" size="3" onchange="selecionarObjetoPorId(this.value)"></select>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8",
            authDomain: "painel-financeiro-borges.firebaseapp.com",
            projectId: "painel-financeiro-borges",
            storageBucket: "painel-financeiro-borges.firebasestorage.app",
            messagingSenderId: "354997627208",
            appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const colecaoApartamento = db.collection("layout_apartamento");

        // DADOS REAIS COLETADOS PELO ROBO PARA CASO PRECISE RESETAR
        const layoutMatematicoColetado = [
          {"nome":"Portão de Fechamento do Quintal","tipo":"portao","largura":3.5,"altura":2,"profundidade":0.05,"posX":-5,"posY":1,"posZ":1.6,"rotY":0},
          {"nome":"Parede Divisória Cozinha e Sala","tipo":"parede","largura":0.15,"altura":2.7,"profundidade":3.7,"posX":-0.8,"posY":1.35,"posZ":-2.05,"rotY":0},
          {"nome":"Parede Entrada do Banheiro","tipo":"parede","largura":1.4,"altura":2.7,"profundidade":0.15,"posX":2.5,"posY":1.35,"posZ":-1.7,"rotY":0},
          {"nome":"Armário Sob a Pia Cozinha (Suspenso)","tipo":"armario","largura":0.55,"altura":0.6,"profundidade":1.8,"posX":-2.8,"posY":0.5,"posZ":-2.8,"rotY":0},
          {"nome":"Armário Suspenso p/ Ferramentas (Quintal)","tipo":"armariotool","largura":0.4,"altura":0.8,"profundidade":1.5,"posX":-6.6,"posY":1.5,"posZ":-1.2,"rotY":0},
          {"nome":"Mini Closet Planejado Quarto 1 (Cabides)","tipo":"closetcabide","largura":0.6,"altura":2.4,"profundidade":2.2,"posX":-2.8,"posY":1.2,"posZ":1.6,"rotY":0},
          {"nome":"Parede Divisória Entre os Dois Quartos","tipo":"parede","largura":0.15,"altura":2.7,"profundidade":3.7,"posX":0,"posY":1.35,"posZ":1.65,"rotY":0},
          {"nome":"Parede Externa Direita (Quarto 2 e Banheiro)","tipo":"parede","largura":0.15,"altura":2.7,"profundidade":7.4,"posX":3.2,"posY":1.35,"posZ":-0.2,"rotY":0},
          {"nome":"Lustre Centro Sala","tipo":"lustre","largura":0.3,"altura":0.5,"profundidade":0.3,"posX":0.6,"posY":2.4,"posZ":-1.2,"rotY":0},
          {"nome":"Parede de Fundo (Cozinha e Banheiro)","tipo":"parede","largura":6.4,"altura":2.7,"profundidade":0.15,"posX":0,"posY":1.35,"posZ":-3.9,"rotY":0},
          {"nome":"Cama Solteiro Duplex Quarto 2","tipo":"camaduplex","largura":0.9,"altura":0.6,"profundidade":1.9,"posX":2.6,"posY":0.3,"posZ":2.2,"rotY":0},
          {"nome":"Parede Frontal (Janela Quarto 1 e Sala)","tipo":"parede","largura":6.4,"altura":2.7,"profundidade":0.15,"posX":0,"posY":1.35,"posZ":3.5,"rotY":0},
          {"nome":"Casinha do Gás Blindada (Lá Fora)","tipo":"gas","largura":0.6,"altura":0.7,"profundidade":0.6,"posX":-3.6,"posY":0.35,"posZ":-3.6,"rotY":0},
          {"nome":"Parede Externa Esquerda (Quarto 1 e Cozinha)","tipo":"parede","largura":0.15,"altura":2.7,"profundidade":7.4,"posX":-3.2,"posY":1.35,"posZ":-0.2,"rotY":0},
          {"nome":"Cooktop Embutido","tipo":"cooktop","largura":0.5,"altura":0.05,"profundidade":0.6,"posX":-2.8,"posY":0.88,"posZ":-2.4,"rotY":0},
          {"nome":"Parede Divisória Corredor (Quartos / Sala)","tipo":"parede","largura":6.4,"altura":2.7,"profundidade":0.15,"posX":0,"posY":1.35,"posZ":-0.2,"rotY":0},
          {"nome":"Bancada Pia Cozinha Suspensa","tipo":"pia","largura":0.6,"altura":0.15,"profundidade":1.8,"posX":-2.8,"posY":0.85,"posZ":-2.8,"rotY":0},
          {"nome":"Closetzinho Quarto 2","tipo":"closetcabide","largura":1.2,"altura":2.4,"profundidade":0.6,"posX":1.2,"posY":1.2,"posZ":0.6,"rotY":0},
          {"nome":"Nicho Ocultador Galão de Água","tipo":"galao","largura":0.45,"altura":0.85,"profundidade":0.45,"posX":-2.8,"posY":0.425,"posZ":-3.6,"rotY":0},
          {"nome":"Máquina de Lavar Suspensa","tipo":"lavadora","largura":0.65,"altura":0.85,"profundidade":0.65,"posX":-4.2,"posY":0.425,"posZ":-1.8,"rotY":0},
          {"nome":"Piso do Quintal (Área Privativa)","tipo":"quintal","largura":3.5,"altura":0.02,"profundidade":5.5,"posX":-5,"posY":0.01,"posZ":-1.1,"rotY":0},
          {"nome":"Parede Direita do Banheiro","tipo":"parede","largura":0.15,"altura":2.7,"profundidade":2.2,"posX":1.8,"posY":1.35,"posZ":-2.8,"rotY":0},
          {"nome":"Painel Amadeirado TV Sala","tipo":"paineltv","largura":2,"altura":2.2,"profundidade":0.05,"posX":-0.7,"posY":1.1,"posZ":-1.1,"rotY":0}
        ];

        document.getElementById('txtImportar').value = JSON.stringify(layoutMatematicoColetado);

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060606);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true; 
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

        const transformControls = new THREE.TransformControls(camera, renderer.domElement);
        scene.add(transformControls);

        transformControls.addEventListener('dragging-changed', function (event) {
            controls.enabled = !event.value;
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.65));
        const spot = new THREE.DirectionalLight(0xffffff, 0.5);
        spot.position.set(15, 30, 15);
        scene.add(spot);

        const grid = new THREE.GridHelper(50, 50, 0x00ff88, 0x161616);
        scene.add(grid);

        window.objetos3DLocais = {};
        let idObjetoSelecionado = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const materiais = {
            parede: new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.6 }),
            quintal: new THREE.MeshStandardMaterial({ color: 0x242d24, roughness: 0.8 }),
            porta: new THREE.MeshStandardMaterial({ color: 0x5a3d28 }),
            janela: new THREE.MeshStandardMaterial({ color: 0x3498db, transparent: true, opacity: 0.4 }),
            pia: new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.4 }),
            armario: new THREE.MeshStandardMaterial({ color: 0x3e2723 }),
            galao: new THREE.MeshStandardMaterial({ color: 0x0077c2 }),
            cooktop: new THREE.MeshStandardMaterial({ color: 0x111111 }),
            gas: new THREE.MeshStandardMaterial({ color: 0xc0392b }),
            lavadora: new THREE.MeshStandardMaterial({ color: 0xe0e0e0 }),
            armariotool: new THREE.MeshStandardMaterial({ color: 0x7f8c8d }),
            portao: new THREE.MeshStandardMaterial({ color: 0x222222 }),
            closetcabide: new THREE.MeshStandardMaterial({ color: 0xd7ccc8 }),
            camaduplex: new THREE.MeshStandardMaterial({ color: 0x1a5276 }),
            paineltv: new THREE.MeshStandardMaterial({ color: 0x5d4037 }),
            lustre: new THREE.MeshStandardMaterial({ color: 0xf1c40f, emissive: 0xf1c40f })
        };

        // Escuta em tempo real as mudanças no banco de dados e FORÇA a escala real lida do doc
        colecaoApartamento.onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                const dados = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added" || change.type === "modified") {
                    if (window.objetos3DLocais[id]) scene.remove(window.objetos3DLocais[id]);

                    // FORÇANDO A LEITURA DINÂMICA COMPLETA DE ESCALA DO BANCO DE DADOS
                    const larg = parseFloat(dados.largura);
                    const alt = parseFloat(dados.altura);
                    const prof = parseFloat(dados.profundidade);
                    
                    const geo = new THREE.BoxGeometry(larg, alt, prof);
                    const mat = materiais[dados.tipo] || materiais.parede;
                    const mesh = new THREE.Mesh(geo, mat);
                    
                    mesh.position.set(parseFloat(dados.posX), parseFloat(dados.posY), parseFloat(dados.posZ));
                    mesh.rotation.y = parseFloat(dados.rotY) || 0;
                    mesh.name = dados.nome;
                    mesh.userData = { id: id, tipo: dados.tipo };

                    scene.add(mesh);
                    window.objetos3DLocais[id] = mesh;

                    if(idObjetoSelecionado === id) transformControls.attach(mesh);
                }
                if (change.type === "removed") {
                    if (window.objetos3DLocais[id]) {
                        if(idObjetoSelecionado === id) transformControls.detach();
                        scene.remove(window.objetos3DLocais[id]);
                        delete window.objetos3DLocais[id];
                    }
                }
            });
            atualizarListaInterface();
        });

        window.addEventListener('click', (e) => {
            if (transformControls.dragging) return;
            if (e.clientX < 360 && e.clientY < window.innerHeight) return; 

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const interseccoes = raycaster.intersectObjects(Object.values(window.objetos3DLocais));
            if (interseccoes.length > 0) {
                selecionarObjetoPorId(interseccoes[0].object.userData.id);
            }
        });

        function controlarZoomManual(fator) {
            camera.position.x *= fator;
            camera.position.y *= fator;
            camera.position.z *= fator;
            controls.target.set(0,0,0);
            controls.update();
        }

        function mudarModoGizmo(modo) {
            transformControls.setMode(modo);
            document.getElementById("modoMover").classList.toggle("ativo", modo === 'translate');
            document.getElementById("modoRedim").classList.toggle("ativo", modo === 'scale');
        }

        function selecionarObjetoPorId(id) {
            idObjetoSelecionado = id;
            const mesh = window.objetos3DLocais[id];
            if (mesh) {
                transformControls.attach(mesh);
                colecaoApartamento.doc(id).get().then(doc => {
                    const d = doc.data();
                    document.getElementById("painelEdicao").style.display = "block";
                    document.getElementById("edicaoTitulo").innerText = `📝 Selecionado: ${d.nome.toUpperCase()}`;
                    document.getElementById("rotY").value = d.rotY || 0;
                    document.getElementById("listaObjetosCenario").value = id;
                });
            }
        }

        function atualizarRotacaoLocal() {
            if (!idObjetoSelecionado || !window.objetos3DLocais[idObjetoSelecionado]) return;
            window.objetos3DLocais[idObjetoSelecionado].rotation.y = parseFloat(document.getElementById("rotY").value);
        }

        function criarNovoObjetoNoBanco() {
            const tipo = document.getElementById("novoTipo").value;
            const nome = document.getElementById("novoNome").value || `Item ${tipo}`;
            
            let l = 1.0, a = 0.8, p = 0.6, y = 0.4;
            if (tipo === "parede") { l = 2.5; a = 2.7; p = 0.15; y = 1.35; }
            else if (tipo === "quintal") { l = 3.5; a = 0.02; p = 5.5; y = 0.01; }
            
            const novoDoc = {
                nome: nome, tipo: tipo, largura: l, altura: a, profundidade: p,
                posX: 0, posY: y, posZ: 0, rotY: 0
            };

            colecaoApartamento.add(novoDoc).then(docRef => {
                document.getElementById("novoNome").value = "";
                setTimeout(() => selecionarObjetoPorId(docRef.id), 200);
            });
        }

        function salvarAlteracoesNoBanco() {
            if (!idObjetoSelecionado || !window.objetos3DLocais[idObjetoSelecionado]) return;
            const mesh = window.objetos3DLocais[idObjetoSelecionado];
            
            mesh.geometry.computeBoundingBox();
            const bbox = mesh.geometry.boundingBox;
            const largReal = (bbox.max.x - bbox.min.x) * mesh.scale.x;
            const altReal = (bbox.max.y - bbox.min.y) * mesh.scale.y;
            const profReal = (bbox.max.z - bbox.min.z) * mesh.scale.z;

            const dadosSalvar = {
                largura: parseFloat(largReal.toFixed(3)),
                altura: parseFloat(altReal.toFixed(3)),
                profundidade: parseFloat(profReal.toFixed(3)),
                rotY: parseFloat(document.getElementById("rotY").value),
                posX: parseFloat(mesh.position.x.toFixed(3)),
                posY: parseFloat(mesh.position.y.toFixed(3)),
                posZ: parseFloat(mesh.position.z.toFixed(3))
            };

            colecaoApartamento.doc(idObjetoSelecionado).update(dadosSalvar).then(() => {
                mesh.scale.set(1,1,1);
                alert("Fixado e salvo no banco de dados!");
            });
        }

        function limparTodoOCenarioDoAp() {
            if (confirm("🚨 ATENÇÃO: Apagar tudo para restaurar o padrão limpo?")) {
                transformControls.detach();
                idObjetoSelecionado = null;
                document.getElementById("painelEdicao").style.display = "none";
                colecaoApartamento.get().then(snapshot => {
                    const batch = db.batch();
                    snapshot.forEach(doc => batch.delete(doc.ref));
                    return batch.commit();
                });
            }
        }

        function executarImportacaoEmMassa() {
            const raw = document.getElementById("txtImportar").value;
            if(!raw) return alert("Adicione o código JSON antes!");
            transformControls.detach();
            idObjetoSelecionado = null;
            
            if(confirm("Deseja substituir todo o cenário atual pelos dados coletados mapeados?")) {
                colecaoApartamento.get().then(snapshot => {
                    const batchLimpeza = db.batch();
                    snapshot.forEach(doc => batchLimpeza.delete(doc.ref));
                    return batchLimpeza.commit();
                }).then(() => {
                    const lista = JSON.parse(raw);
                    const batchInsercao = db.batch();
                    lista.forEach(obj => {
                        const novoRef = colecaoApartamento.doc();
                        batchInsercao.set(novoRef, obj);
                    });
                    return batchInsercao.commit();
                }).then(() => {
                    alert("Cenário remontado com sucesso e travas de tamanho removidas!");
                });
            }
        }

        function deletarObjetoDoBanco() {
            if (!idObjetoSelecionado) return;
            colecaoApartamento.doc(idObjetoSelecionado).delete().then(() => {
                document.getElementById("painelEdicao").style.display = "none";
                transformControls.detach();
                idObjetoSelecionado = null;
            });
        }

        function atualizarListaInterface() {
            const select = document.getElementById("listaObjetosCenario");
            select.innerHTML = "";
            colecaoApartamento.get().then(snapshot => {
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const opt = document.createElement("option");
                    opt.value = doc.id;
                    opt.text = `${d.nome} (${d.tipo.toUpperCase()})`;
                    select.appendChild(opt);
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
