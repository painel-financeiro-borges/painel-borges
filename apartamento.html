<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Borges - Simulador Apê 3D</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0b0b0b; font-family: 'Outfit', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* Interface Noir / Tecnológica do Painel Borges */
        .painel-status {
            position: absolute; top: 20px; left: 20px;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 16px; border: 1px solid rgba(0, 255, 136, 0.2);
            color: white; z-index: 10; width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .painel-status h5 { margin: 0 0 5px 0; font-size: 1rem; font-weight: 900; letter-spacing: 1px; color: #00ff88; }
        .painel-status subtitle { font-size: 0.75rem; color: #888; display: block; margin-bottom: 15px; text-transform: uppercase; }
        
        .comodo-tag {
            font-size: 0.75rem; font-weight: bold; padding: 4px 8px; border-radius: 4px;
            background: rgba(255,255,255,0.05); display: inline-block; margin-bottom: 5px; border-left: 3px solid #00ff88;
        }
        
        .regra-limpeza {
            background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 8px; border-radius: 6px; font-size: 0.75rem; color: #ff6b6b; margin-top: 15px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div class="painel-status">
        <h5>APARTAMENTO BORGES</h5>
        <subtitle>Mapeamento de Planejados</subtitle>
        
        <div class="comodo-tag">📐 Layout 100% Retido (Sem Quebra)</div>
        <div class="comodo-tag">🧼 Foco: Tudo Suspenso do Chão</div>
        
        <div class="regra-limpeza">
            <i class="fas fa-broom"></i> <strong>Regra de Ouro:</strong> Cozinha e Área de Serviço com vão livre inferior para facilitar a varredura.
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. CONFIGURAÇÃO AMBIENTE NOIR ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(14, 12, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // --- 2. ILUMINAÇÃO DE DESTAQUE (HIGH CONTRAST) ---
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(luzAmbiente);

        // Luz do Sol / Externa
        const luzDirecional = new THREE.DirectionalLight(0xfffaed, 0.8);
        luzDirecional.position.set(15, 20, 10);
        luzDirecional.castShadow = true;
        luzDirecional.shadow.mapSize.width = 2048;
        luzDirecional.shadow.mapSize.height = 2048;
        scene.add(luzDirecional);

        // --- 3. MATERIAIS CONFIGURADOS ---
        const matPisoInterno = new THREE.MeshStandardMaterial({ color: 0x3a2f28, roughness: 0.5 }); // Vinílico/Madeira Escura
        const matPisoExterno = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7 }); // Cimento/Cerâmica Área Externa
        const matParede = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.6 });
        const matMadeiraPlanejados = new THREE.MeshStandardMaterial({ color: 0x6e503b, roughness: 0.4 }); // MDF Planejados
        const matMetalInox = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
        const matGasInox = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.5 }); // Detalhe de Segurança

        // --- 4. CONSTRUÇÃO DA PLANTA ---
        
        // Chão de Dentro (Sala, Cozinha, Quartos)
        const chaoInternoGeo = new THREE.BoxGeometry(16, 0.1, 12);
        const chaoInterno = new THREE.Mesh(chaoInternoGeo, matPisoInterno);
        chaoInterno.position.set(0, 0, 0);
        chaoInterno.receiveShadow = true;
        scene.add(chaoInterno);

        // Área Externa (Onde vai ficar o Botijão de Gás e a Máquina de Lavar)
        const chaoExternoGeo = new THREE.BoxGeometry(6, 0.08, 12);
        const chaoExterno = new THREE.Mesh(chaoExternoGeo, matPisoExterno);
        chaoExterno.position.set(11, -0.01, 0); // Fica acoplado ao lado direito da cozinha
        chaoExterno.receiveShadow = true;
        scene.add(chaoExterno);

        // Grid de Medição Técnica
        const grid = new THREE.GridHelper(34, 34, 0x00ff88, 0x222222);
        grid.position.y = 0.06;
        scene.add(grid);

        // --- 5. FUNÇÕES CONSTRUTORAS DE ELEMENTOS ---

        function criarParede(largura, altura, profundidade, x, y, z, rotY = 0) {
            const geo = new THREE.BoxGeometry(largura, altura, profundidade);
            const mesh = new THREE.Mesh(geo, matParede);
            mesh.position.set(x, y, z);
            mesh.rotation.y = rotY;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
        }

        function criarMovelSuspenso(largura, altura, profundidade, x, y, z, material = matMadeiraPlanejados) {
            const geo = new THREE.BoxGeometry(largura, altura, profundidade);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // --- 6. SUBINDO AS PAREDES REAIS ---
        criarParede(16, 2.8, 0.2, 0, 1.4, -6); // Parede traseira geral
        criarParede(12, 2.8, 0.2, -8, 1.4, 0, Math.PI / 2); // Parede lateral esquerda

        // Divisória Cozinha / Área Externa (Com espaço para passagem/porta)
        criarParede(4, 2.8, 0.2, 8, 1.4, -4);
        criarParede(4, 2.8, 0.2, 8, 1.4, 4);

        // --- 7. MONTANDO SEU PLANEJAMENTO DE DETALHES ---

        // SALA: Painel Ripado da TV
        criarMovelSuspenso(4, 2.4, 0.1, -4, 1.3, -5.8); 

        // COZINHA: Pia com Armário Suspenso (Vão livre embaixo de 20cm para vassoura)
        // Parametros: largura, altura, profundidade, X, Y, Z
        criarMovelSuspenso(4, 0.7, 0.6, 5, 0.55, -5.4, matMadeiraPlanejados); // Balcão da pia suspenso do chão!
        criarMovelSuspenso(4, 0.6, 0.4, 5, 2.0, -5.5, matMadeiraPlanejados); // Armário Aéreo (Pratos/Microondas)

        // COZINHA: Nicho para o Galão de Água com a Bombinha Embutida
        criarMovelSuspenso(0.6, 0.9, 0.6, 7, 0.65, -5.4, matMadeiraPlanejados); // Cubo do galão (só sai o bico)

        // ÁREA EXTERNA: Casinha de Segurança para o Botijão de Gás (Protegido lá fora)
        criarMovelSuspenso(0.8, 0.8, 0.8, 9.5, 0.4, -5.3, matGasInox);

        // ÁREA EXTERNA: Armário Suspenso para Ferramentas e Coisas Velhas
        criarMovelSuspenso(2, 1.2, 0.5, 12, 1.6, -5.4, matMadeiraPlanejados);

        // QUARTO: Cama Suspensa Planejada
        criarMovelSuspenso(2, 0.5, 1.9, -6, 0.8, 3, matMadeiraPlanejados);

        // --- 8. LOOP DE EXECUÇÃO ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
