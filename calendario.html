<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Painel Borges - Calendário</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; background: #f4f4f4; }
        .controles { height: 50px; background: #ddd; display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        
        /* Layout Grid Otimizado */
        .calendario-container { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            padding: 10px;
            /* Removi o height fixo para permitir que o navegador calcule o tamanho real */
        }
        @media (max-width: 768px) {
            .calendario-container { grid-template-columns: repeat(2, 1fr); }
        }

        .mes-bloco { background: #fff; border: 1px solid #ccc; padding: 8px; border-radius: 4px; }
        .mes-titulo { font-weight: bold; text-align: center; margin-bottom: 5px; border-bottom: 2px solid #333; }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .dia { border: 1px solid #eee; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9em; }
        .dia:hover { background: #eef; }
        
        #modalAnotacao { display:none; position:fixed; top:10%; left:5%; width:90%; max-width: 500px; background:white; padding:20px; border-radius:10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; }
        @media print { .controles, #modalAnotacao { display: none !important; } }
    </style>
</head>
<body>

    <div class="controles">
        <select id="selectAno" onchange="renderizarAno()">
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
            <option value="2030">2030</option>
        </select>
        <button onclick="window.print()">Imprimir Calendário</button>
    </div>

    <div id="app" class="calendario-container"></div>

    <div id="modalAnotacao">
        <h2 id="modalData">Data</h2>
        <textarea id="textoAnotacao" placeholder="Anotação abreviada (ex: evento)..." style="width:100%; height:80px;"></textarea>
        <div style="margin: 10px 0;">
            <label>Cor: </label>
            <input type="color" id="corAnotacao" value="#3498db">
        </div>
        <button id="btnSalvar">Salvar no Firebase</button>
        <button onclick="fecharModal()">Fechar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8",
            authDomain: "painel-financeiro-borges.firebaseapp.com",
            projectId: "painel-financeiro-borges",
            storageBucket: "painel-financeiro-borges.firebasestorage.app",
            messagingSenderId: "354997627208",
            appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d",
            measurementId: "G-KH9BDWN2WH"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const app = document.getElementById('app');
        const modal = document.getElementById('modalAnotacao');
        let dataSelecionada = null;

        window.renderizarAno = () => {
            const ano = document.getElementById('selectAno').value;
            app.innerHTML = '';
            for (let mes = 0; mes < 12; mes++) {
                const mesDiv = document.createElement('div');
                mesDiv.className = 'mes-bloco';
                mesDiv.innerHTML = `<div class="mes-titulo">${new Date(ano, mes).toLocaleString('pt-BR', { month: 'long' })}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid-dias';
                
                const diasNoMes = new Date(ano, mes + 1, 0).getDate();
                for (let i = 1; i <= diasNoMes; i++) {
                    const diaDiv = document.createElement('div');
                    diaDiv.className = 'dia';
                    diaDiv.innerHTML = `<span>${i}</span>`;
                    diaDiv.onclick = () => abrirModal(i, mes + 1, ano);
                    grid.appendChild(diaDiv);
                }
                mesDiv.appendChild(grid);
                app.appendChild(mesDiv);
            }
        };

        window.abrirModal = (d, m, a) => {
            dataSelecionada = `${d}/${m}/${a}`;
            document.getElementById('modalData').innerText = `Data: ${dataSelecionada}`;
            modal.style.display = 'block';
        };

        window.fecharModal = () => { modal.style.display = 'none'; };

        document.getElementById('btnSalvar').onclick = async () => {
            const texto = document.getElementById('textoAnotacao').value;
            const cor = document.getElementById('corAnotacao').value;
            try {
                await addDoc(collection(db, "calendario_anotacoes"), { data: dataSelecionada, texto, cor, timestamp: new Date() });
                alert("Salvo com sucesso!");
                fecharModal();
            } catch (e) { alert("Erro: " + e.message); }
        };

        renderizarAno();
    </script>
</body>
</html>
