<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Painel Borges - Calendário</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; background: #f4f4f4; overflow-x: hidden; }
        .controles { height: 60px; background: #ddd; display: flex; align-items: center; padding: 0 10px; gap: 8px; position: sticky; top: 0; z-index: 999; }
        
        #inputAno { width: 80px !important; height: 40px; font-size: 1.2em; border: 1px solid #999; border-radius: 4px; }
        button { height: 40px; padding: 0 10px; cursor: pointer; }

        .calendario-wrapper { transition: transform 0.2s; width: 100%; transform-origin: top left; }
        .calendario-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 5px; width: 100vw; }
        
        .mes-bloco { background: #fff; border: 1px solid #ccc; padding: 2px; border-radius: 2px; }
        .mes-titulo { font-weight: bold; text-align: center; font-size: 2vw; margin-bottom: 2px; border-bottom: 1px solid #333; }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        
        .dia { border: 1px solid #eee; min-height: 8vw; display: flex; flex-direction: column; cursor: pointer; position: relative; font-size: 0.7vw; overflow: hidden; }
        .dia-topo { font-weight: bold; border-bottom: 1px solid #333; text-align: center; background: #f0f0f0; padding: 2px; }
        .evento-tag { color: white; padding: 2px; margin: 1px 0; font-size: 0.6vw; border-radius: 2px; white-space: nowrap; }

        #modalAnotacao { display:none; position:fixed; top:5%; left:5%; width:90%; max-width: 500px; background:white; padding:20px; border-radius:10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; max-height: 80vh; overflow-y: auto; }
        .item-anotacao { padding: 5px; margin: 5px 0; border-left: 5px solid; font-size: 0.9em; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center; }
        @media print { .controles, #modalAnotacao { display: none !important; } }
    </style>
</head>
<body>

    <div class="controles">
        <input type="number" id="inputAno" min="2000" max="2100" onchange="confirmarMudancaAno(this.value)">
        <button onclick="window.print()">Imprimir</button>
        <button onclick="ajustarZoom(-0.1)">-</button>
        <button onclick="ajustarZoom(0.1)">+</button>
    </div>

    <div id="wrapper" class="calendario-wrapper">
        <div id="app" class="calendario-container"></div>
    </div>

    <div id="modalAnotacao">
        <h2 id="modalData">Data</h2>
        <div id="listaAnotacoes" style="margin-bottom: 15px;"></div>
        <hr>
        <input type="hidden" id="idEditando">
        <input type="text" id="inputTitulo" placeholder="Título (máx 7 char)" maxlength="7" style="width:100%; margin-bottom:5px;">
        <textarea id="textoAnotacao" placeholder="Dados do evento..." style="width:100%; height:60px;"></textarea>
        <div style="margin: 10px 0;">
            <label>Cor: </label>
            <input type="color" id="corAnotacao" value="#3498db" oninput="document.getElementById('codCor').value = this.value">
            <input type="text" id="codCor" value="#3498db" style="width: 70px;" oninput="document.getElementById('corAnotacao').value = this.value">
        </div>
        <button id="btnSalvar">Salvar Evento</button>
        <button onclick="fecharModal()">Fechar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8",
            authDomain: "painel-financeiro-borges.firebaseapp.com",
            projectId: "painel-financeiro-borges",
            storageBucket: "painel-financeiro-borges.firebasestorage.app",
            messagingSenderId: "354997627208",
            appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d",
            measurementId: "G-KH9BDWN2WH"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const app = document.getElementById('app');
        const wrapper = document.getElementById('wrapper');
        const modal = document.getElementById('modalAnotacao');
        
        let dataSelecionada = null;
        let zoomLevel = 1;
        let anotacoes = {};
        let anoAtual = new Date().getFullYear();

        document.getElementById('inputAno').value = anoAtual;

        window.confirmarMudancaAno = (novoAno) => {
            if (confirm(`Alterar o ano para ${novoAno}?`)) {
                anoAtual = novoAno;
                iniciarRenderizacao();
            } else {
                document.getElementById('inputAno').value = anoAtual;
            }
        };

        window.ajustarZoom = (delta) => {
            zoomLevel = Math.min(Math.max(zoomLevel + delta, 0.5), 2.0);
            wrapper.style.transform = `scale(${zoomLevel})`;
        };

        async function carregarAnotacoes() {
            anotacoes = {};
            const querySnapshot = await getDocs(collection(db, "calendario_anotacoes"));
            querySnapshot.forEach((doc) => {
                const d = doc.data();
                if (!anotacoes[d.data]) anotacoes[d.data] = [];
                anotacoes[d.data].push({ id: doc.id, titulo: d.titulo || d.texto.substring(0,7), texto: d.texto, cor: d.cor });
            });
        }

        window.iniciarRenderizacao = async () => {
            await carregarAnotacoes();
            renderizarAno();
        };

        window.renderizarAno = () => {
            const ano = document.getElementById('inputAno').value;
            app.innerHTML = '';
            for (let mes = 0; mes < 12; mes++) {
                const mesDiv = document.createElement('div');
                mesDiv.className = 'mes-bloco';
                mesDiv.innerHTML = `<div class="mes-titulo">${new Date(ano, mes).toLocaleString('pt-BR', { month: 'long' })}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid-dias';
                
                const diasNoMes = new Date(ano, mes + 1, 0).getDate();
                for (let i = 1; i <= diasNoMes; i++) {
                    const dataChave = `${i}/${mes + 1}/${ano}`;
                    const diaDiv = document.createElement('div');
                    diaDiv.className = 'dia';
                    diaDiv.innerHTML = `<div class="dia-topo">${i}</div>`;
                    
                    if (anotacoes[dataChave]) {
                        anotacoes[dataChave].forEach(item => {
                            const eventDiv = document.createElement('div');
                            eventDiv.className = 'evento-tag';
                            eventDiv.style.backgroundColor = item.cor;
                            eventDiv.innerText = item.titulo;
                            diaDiv.appendChild(eventDiv);
                        });
                    }
                    
                    diaDiv.onclick = () => abrirModal(i, mes + 1, ano);
                    grid.appendChild(diaDiv);
                }
                mesDiv.appendChild(grid);
                app.appendChild(mesDiv);
            }
        };

        window.abrirModal = (d, m, a, itemEdit = null) => {
            dataSelecionada = `${d}/${m}/${a}`;
            document.getElementById('modalData').innerText = `Data: ${dataSelecionada}`;
            const lista = document.getElementById('listaAnotacoes');
            lista.innerHTML = '';
            
            if (itemEdit) {
                document.getElementById('idEditando').value = itemEdit.id;
                document.getElementById('inputTitulo').value = itemEdit.titulo;
                document.getElementById('textoAnotacao').value = itemEdit.texto;
                document.getElementById('corAnotacao').value = itemEdit.cor;
                document.getElementById('codCor').value = itemEdit.cor;
            } else {
                document.getElementById('idEditando').value = '';
                document.getElementById('inputTitulo').value = '';
                document.getElementById('textoAnotacao').value = '';
            }

            const itens = anotacoes[dataSelecionada] || [];
            itens.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-anotacao';
                div.style.borderLeftColor = item.cor;
                div.innerHTML = `<span><strong>${item.titulo}:</strong> ${item.texto}</span>
                    <div>
                        <button onclick="abrirModal(${d}, ${m}, ${a}, {id: '${item.id}', titulo: '${item.titulo}', texto: '${item.texto}', cor: '${item.cor}'})">Edit</button>
                        <button onclick="excluirEvento('${item.id}')">Del</button>
                    </div>`;
                lista.appendChild(div);
            });
            modal.style.display = 'block';
        };

        window.fecharModal = () => { modal.style.display = 'none'; };

        window.excluirEvento = async (id) => {
            if(confirm("Excluir este evento?")) {
                await deleteDoc(doc(db, "calendario_anotacoes", id));
                iniciarRenderizacao();
                fecharModal();
            }
        };

        document.getElementById('btnSalvar').onclick = async () => {
            const id = document.getElementById('idEditando').value;
            const titulo = document.getElementById('inputTitulo').value;
            const texto = document.getElementById('textoAnotacao').value;
            const cor = document.getElementById('corAnotacao').value;
            
            if (!titulo || !texto) return;

            if (id) {
                await updateDoc(doc(db, "calendario_anotacoes", id), { titulo, texto, cor });
            } else {
                await addDoc(collection(db, "calendario_anotacoes"), { data: dataSelecionada, titulo, texto, cor, timestamp: new Date() });
            }
            iniciarRenderizacao();
            fecharModal();
        };

        iniciarRenderizacao();
    </script>
</body>
</html>
