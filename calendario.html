<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Borges - Calendário</title>
    <style>
        :root { --celula-tamanho: 100px; }
        body { font-family: sans-serif; padding: 10px; background: #f4f4f4; }
        
        .calendario-container { display: flex; flex-direction: column; gap: 20px; }
        .mes-bloco { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        
        .dia { 
            min-height: var(--celula-tamanho); 
            border: 1px solid #ddd; 
            padding: 5px; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
        }
        .dia:hover { background: #eef; }
        .numero-dia { font-weight: bold; border-bottom: 2px solid #333; margin-bottom: 5px; }
        
        /* Estilo do Modal */
        #modalAnotacao { display:none; position:fixed; top:10%; left:5%; width:90%; max-width: 500px; background:white; padding:20px; border-radius:10px; box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 1000; }
        
        @media (max-width: 600px) {
            :root { --celula-tamanho: 70px; }
            .grid-dias { grid-template-columns: repeat(7, 1fr); }
        }
    </style>
</head>
<body>

    <h1>Calendário de Planejamento</h1>
    <div id="app" class="calendario-container"></div>

    <!-- Modal -->
    <div id="modalAnotacao">
        <h2 id="modalData">Data</h2>
        <textarea id="textoAnotacao" placeholder="Anotação abreviada (ex: evento)..." style="width:100%; height:80px; margin-bottom:10px;"></textarea>
        
        <div style="margin-bottom:15px;">
            <label>Cor da anotação: </label>
            <input type="color" id="corAnotacao" value="#3498db">
        </div>
        
        <button onclick="salvarAnotacao()">Salvar</button>
        <button onclick="fecharModal()">Fechar</button>
    </div>

    <script>
        const app = document.getElementById('app');
        const modal = document.getElementById('modalAnotacao');
        let dataSelecionada = null;

        function gerarCalendario() {
            const hoje = new Date();
            let dataAtual = new Date(2026, 5, 1); // Junho 2026
            const fim = new Date(2027, 11, 31); // Dezembro 2027

            while (dataAtual <= fim) {
                const mesDiv = document.createElement('div');
                mesDiv.className = 'mes-bloco';
                mesDiv.innerHTML = `<h3>${dataAtual.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })}</h3>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid-dias';

                const diasNoMes = new Date(dataAtual.getFullYear(), dataAtual.getMonth() + 1, 0).getDate();

                for (let i = 1; i <= diasNoMes; i++) {
                    const diaDiv = document.createElement('div');
                    diaDiv.className = 'dia';
                    diaDiv.innerHTML = `<div class="numero-dia">${i < 10 ? '0'+i : i}</div>`;
                    
                    const mes = dataAtual.getMonth() + 1;
                    const ano = dataAtual.getFullYear();
                    diaDiv.onclick = () => abrirModal(i, mes, ano);
                    
                    grid.appendChild(diaDiv);
                }

                mesDiv.appendChild(grid);
                app.appendChild(mesDiv);
                dataAtual.setMonth(dataAtual.getMonth() + 1);
            }
        }

        function abrirModal(dia, mes, ano) {
            dataSelecionada = `${dia}/${mes}/${ano}`;
            document.getElementById('modalData').innerText = `Data: ${dataSelecionada}`;
            modal.style.display = 'block';
        }

        function fecharModal() {
            modal.style.display = 'none';
        }

        function salvarAnotacao() {
            const texto = document.getElementById('textoAnotacao').value;
            const cor = document.getElementById('corAnotacao').value;
            alert(`Salvando: "${texto}" na cor ${cor} para o dia ${dataSelecionada}`);
            fecharModal();
        }

        gerarCalendario();
    </script>
</body>
</html>
