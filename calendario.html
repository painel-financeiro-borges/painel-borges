<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Painel Borges - Calendário</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; background: #f4f4f4; overflow-x: hidden; }
        .controles { height: 60px; background: #ddd; display: flex; align-items: center; padding: 0 10px; gap: 8px; position: sticky; top: 0; z-index: 999; }
        
        /* Aumentei o input para facilitar clique no mobile */
        #inputAno { width: 80px !important; height: 40px; font-size: 1.2em; border: 1px solid #999; border-radius: 4px; }
        button { height: 40px; padding: 0 10px; cursor: pointer; }

        .calendario-wrapper { transition: transform 0.2s; width: 100%; transform-origin: top left; }
        .calendario-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 5px; width: 100vw; }
        
        .mes-bloco { background: #fff; border: 1px solid #ccc; padding: 2px; border-radius: 2px; }
        .mes-titulo { font-weight: bold; text-align: center; font-size: 2vw; margin-bottom: 2px; border-bottom: 1px solid #333; }
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .dia { border: 1px solid #eee; height: 5vw; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.8vw; position: relative; }
        .dia:hover { background: #eef; }
        
        /* Indicador de quantidade de anotações */
        .badge { position: absolute; top: 1px; right: 1px; background: red; color: white; border-radius: 50%; font-size: 1vw; width: 1.5vw; height: 1.5vw; display: flex; align-items: center; justify-content: center; }

        #modalAnotacao { display:none; position:fixed; top:5%; left:5%; width:90%; max-width: 500px; background:white; padding:20px; border-radius:10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; max-height: 80vh; overflow-y: auto; }
        .item-anotacao { padding: 5px; margin: 5px 0; border-left: 5px solid; font-size: 0.9em; background: #f9f9f9; }
        @media print { .controles, #modalAnotacao { display: none !important; } }
    </style>
</head>
<body>

    <div class="controles">
        <input type="number" id="inputAno" min="2000" max="2100" onchange="confirmarMudancaAno(this.value)">
        <button onclick="window.print()">Imprimir</button>
        <button onclick="ajustarZoom(-0.1)">-</button>
        <button onclick="ajustarZoom(0.1)">+</button>
    </div>

    <div id="wrapper" class="calendario-wrapper">
        <div id="app" class="calendario-container"></div>
    </div>

    <div id="modalAnotacao">
        <h2 id="modalData">Data</h2>
        <div id="listaAnotacoes" style="margin-bottom: 15px;"></div>
        <hr>
        <textarea id="textoAnotacao" placeholder="Nova anotação..." style="width:100%; height:60px;"></textarea>
        <div style="margin: 10px 0;">
            <label>Cor: </label>
            <input type="color" id="corAnotacao" value="#3498db">
        </div>
        <button id="btnSalvar">Adicionar ao dia</button>
        <button onclick="fecharModal()">Fechar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8",
            authDomain: "painel-financeiro-borges.firebaseapp.com",
            projectId: "painel-financeiro-borges",
            storageBucket: "painel-financeiro-borges.firebasestorage.app",
            messagingSenderId: "354997627208",
            appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d",
            measurementId: "G-KH9BDWN2WH"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const app = document.getElementById('app');
        const wrapper = document.getElementById('wrapper');
        const modal = document.getElementById('modalAnotacao');
        
        let dataSelecionada = null;
        let zoomLevel = 1;
        let anotacoes = {};
        let anoAtual = new Date().getFullYear();

        document.getElementById('inputAno').value = anoAtual;

        window.confirmarMudancaAno = (novoAno) => {
            if (confirm(`Alterar o ano para ${novoAno}?`)) {
                anoAtual = novoAno;
                iniciarRenderizacao();
            } else {
                document.getElementById('inputAno').value = anoAtual;
            }
        };

        window.ajustarZoom = (delta) => {
            zoomLevel = Math.min(Math.max(zoomLevel + delta, 0.5), 2.0);
            wrapper.style.transform = `scale(${zoomLevel})`;
        };

        async function carregarAnotacoes() {
            anotacoes = {};
            const querySnapshot = await getDocs(collection(db, "calendario_anotacoes"));
            querySnapshot.forEach((doc) => {
                const d = doc.data();
                if (!anotacoes[d.data]) anotacoes[d.data] = [];
                anotacoes[d.data].push({ texto: d.texto, cor: d.cor });
            });
        }

        window.iniciarRenderizacao = async () => {
            await carregarAnotacoes();
            renderizarAno();
        };

        window.renderizarAno = () => {
            const ano = document.getElementById('inputAno').value;
            app.innerHTML = '';
            for (let mes = 0; mes < 12; mes++) {
                const mesDiv = document.createElement('div');
                mesDiv.className = 'mes-bloco';
                mesDiv.innerHTML = `<div class="mes-titulo">${new Date(ano, mes).toLocaleString('pt-BR', { month: 'long' })}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid-dias';
                
                const diasNoMes = new Date(ano, mes + 1, 0).getDate();
                for (let i = 1; i <= diasNoMes; i++) {
                    const dataChave = `${i}/${mes + 1}/${ano}`;
                    const diaDiv = document.createElement('div');
                    diaDiv.className = 'dia';
                    diaDiv.innerHTML = `<span>${i}</span>`;
                    
                    if (anotacoes[dataChave] && anotacoes[dataChave].length > 0) {
                        diaDiv.style.backgroundColor = anotacoes[dataChave][anotacoes[dataChave].length - 1].cor;
                        // Badge de visualização rápida
                        const badge = document.createElement('div');
                        badge.className = 'badge';
                        badge.innerText = anotacoes[dataChave].length;
                        diaDiv.appendChild(badge);
                    }
                    
                    diaDiv.onclick = () => abrirModal(i, mes + 1, ano);
                    grid.appendChild(diaDiv);
                }
                mesDiv.appendChild(grid);
                app.appendChild(mesDiv);
            }
        };

        window.abrirModal = (d, m, a) => {
            dataSelecionada = `${d}/${m}/${a}`;
            document.getElementById('modalData').innerText = `Data: ${dataSelecionada}`;
            const lista = document.getElementById('listaAnotacoes');
            lista.innerHTML = '';
            const itens = anotacoes[dataSelecionada] || [];
            itens.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-anotacao';
                div.style.borderLeftColor = item.cor;
                div.innerText = item.texto;
                lista.appendChild(div);
            });
            modal.style.display = 'block';
        };

        window.fecharModal = () => { modal.style.display = 'none'; };

        document.getElementById('btnSalvar').onclick = async () => {
            const texto = document.getElementById('textoAnotacao').value;
            const cor = document.getElementById('corAnotacao').value;
            if (!texto) return;
            try {
                await addDoc(collection(db, "calendario_anotacoes"), { data: dataSelecionada, texto, cor, timestamp: new Date() });
                document.getElementById('textoAnotacao').value = '';
                iniciarRenderizacao();
                abrirModal(dataSelecionada.split('/')[0], dataSelecionada.split('/')[1], dataSelecionada.split('/')[2]);
            } catch (e) { alert("Erro: " + e.message); }
        };

        iniciarRenderizacao();
    </script>
</body>
</html>
