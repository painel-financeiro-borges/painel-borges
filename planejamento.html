<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BORGES | COMMAND CENTER</title>
<style>
    :root { --bg: #000; --verde: #39ff14; --vermelho: #ff003c; --cinza: #1a1a1a; --branco: #fff; }
    body { background: var(--bg); color: var(--branco); font-family: 'Arial Black', sans-serif; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    .box { border: 2px solid #333; padding: 20px; border-radius: 8px; background: #050505; }
    h2 { font-size: 12px; color: #666; margin-bottom: 15px; letter-spacing: 1px; }
    .num { font-size: 40px; margin: 10px 0; color: var(--verde); }
    input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; }
    .btn-act { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; }
    .btn-meta { background: #333; color: #fff; }
    .btn-injetar { background: var(--verde); color: #000; }
    .btn-zerar { background: var(--vermelho); color: #fff; margin-top: 20px; }
    .health { border: 2px solid var(--verde); }
</style>
</head>
<body>

<div class="grid">
    <!-- SEMANA -->
    <div class="box">
        <h2>CICLO SEMANAL</h2>
        <div style="font-size:14px">META: <span id="mSem">0</span></div>
        <div class="num" id="gSem">R$ 0</div>
        <input type="number" id="inMSem" placeholder="Definir meta semanal">
        <button class="btn-act btn-meta" onclick="att('mSem', 'inMSem')">SETAR META</button>
        <input type="number" id="inGSem" placeholder="Injetar ganho semanal">
        <button class="btn-act btn-injetar" onclick="injetarSem()">INJETAR GANHO</button>
        <button class="btn-act btn-zerar" onclick="zerar('mSem', 'gSem', 'semana')">ZERAR SEMANA</button>
    </div>

    <!-- MÊS -->
    <div class="box">
        <h2>CICLO MENSAL</h2>
        <div style="font-size:14px">META: <span id="mMes">0</span></div>
        <div class="num" id="gMes">R$ 0</div>
        <input type="number" id="inMMes" placeholder="Definir meta mensal">
        <button class="btn-act btn-meta" onclick="att('mMes', 'inMMes')">SETAR META</button>
        <button class="btn-act btn-zerar" onclick="zerar('mMes', 'gMes', 'mes')">ZERAR MÊS</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const db = firebase.initializeApp({apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8", authDomain: "painel-financeiro-borges.firebaseapp.com", projectId: "painel-financeiro-borges", storageBucket: "painel-financeiro-borges.firebasestorage.app", messagingSenderId: "354997627208", appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"}).firestore();
    const ref = db.collection("planejamento_financeiro").doc("status_atual");

    function att(campo, id) {
        let v = parseFloat(document.getElementById(id).value);
        if(!v) return;
        ref.update({ [campo]: v });
    }

    function injetarSem() {
        let v = parseFloat(document.getElementById('inGSem').value);
        if(!v) return;
        db.runTransaction(async t => {
            const d = (await t.get(ref)).data();
            t.update(ref, { gSem: (d.gSem || 0) + v, gMes: (d.gMes || 0) + v });
        });
    }

    function zerar(m, g, tipo) {
        if(!confirm("CONFIRMA ZERAR?")) return;
        let obj = {}; obj[m] = 0; obj[g] = 0;
        ref.update(obj);
    }

    ref.onSnapshot(doc => {
        const d = doc.data() || {};
        document.getElementById('mSem').innerText = d.mSem || 0;
        document.getElementById('gSem').innerText = 'R$ ' + (d.gSem || 0);
        document.getElementById('mMes').innerText = d.mMes || 0;
        document.getElementById('gMes').innerText = 'R$ ' + (d.gMes || 0);
    });
</script>
</body>
</html>
