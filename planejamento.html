<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BORGES | COMMAND CENTER 3D</title>
    <style>
        :root { --bg: #050505; --panel: #0a0a0a; --neon-green: #39ff14; --neon-red: #ff003c; --text: #cccccc; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .box { 
            background: var(--panel); padding: 25px; border-radius: 20px; 
            border-top: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.05); 
        }
        .num { font-size: 3rem; font-weight: 900; color: #fff; margin: 10px 0; }
        .saude { font-size: 1.2rem; font-weight: bold; }
        .pos { color: var(--neon-green); } .neg { color: var(--neon-red); }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon-green); border-radius: 8px; margin: 5px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; border: none; font-weight: 900; border-radius: 8px; margin-top: 5px; text-transform: uppercase; }
        .btn-green { background: var(--neon-green); color: #000; }
        .btn-red { background: var(--neon-red); color: #fff; margin-top: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; cursor: pointer; border-left: 4px solid transparent; }
        .item.pago { border-left-color: var(--neon-green); color: var(--neon-green); }
        .item.pendente { border-left-color: var(--neon-red); color: var(--neon-red); }
    </style>
</head>
<body>

<div class="grid">
    <div class="box">
        <h2>CICLO SEMANAL</h2>
        <div class="num" id="gSem">R$ 0</div>
        <div id="sSem" class="saude">SAÚDE: R$ 0</div>
        <input type="number" id="inMSem" placeholder="Meta">
        <button onclick="att('mSem', 'inMSem')">SETAR META</button>
        <input type="number" id="inGSem" placeholder="Ganho">
        <button class="btn-green" onclick="injetarSem()">INJETAR GANHO</button>
        <button class="btn-red" onclick="zerar('mSem', 'gSem')">ZERAR SEMANA</button>
    </div>

    <div class="box">
        <h2>CICLO MENSAL</h2>
        <div class="num" id="gMes">R$ 0</div>
        <div id="sMes" class="saude">SAÚDE: R$ 0</div>
        <input type="number" id="inMMes" placeholder="Meta">
        <button onclick="att('mMes', 'inMMes')">SETAR META</button>
        <button class="btn-red" onclick="zerar('mMes', 'gMes')">ZERAR MÊS</button>
    </div>

    <div class="box">
        <h2>CICLO ANUAL</h2>
        <div class="num" id="gAno">R$ 0</div>
        <input type="number" id="inMAno" placeholder="Meta">
        <button onclick="att('mAno', 'inMAno')">SETAR META</button>
        <input type="number" id="inGAno" placeholder="Injetar Ganho">
        <button class="btn-green" onclick="att('gAno', 'inGAno')">INJETAR GANHO</button>
        <button class="btn-red" onclick="zerar('mAno', 'gAno')">ZERAR ANO</button>
    </div>
</div>

<div class="box" style="margin-top:25px;">
    <h2>GESTÃO DE CUSTOS</h2>
    <input type="text" id="nCusto" placeholder="Nome">
    <input type="number" id="vCusto" placeholder="Valor">
    <select id="tipoCusto"><option value="mensal">Mensal</option><option value="anual">Anual</option></select>
    <button class="btn-green" onclick="addCusto()">ADICIONAR</button>
    <h3>MENSAL: <span id="totMensal">0</span> | ANUAL: <span id="totAnual">0</span></h3>
    <div id="listaCustos"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const db = firebase.initializeApp({apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8", authDomain: "painel-financeiro-borges.firebaseapp.com", projectId: "painel-financeiro-borges", storageBucket: "painel-financeiro-borges.firebasestorage.app", messagingSenderId: "354997627208", appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"}).firestore();
    const ref = db.collection("planejamento_financeiro").doc("status_atual");

    function att(c, id) { let v = parseFloat(document.getElementById(id).value); if(v) ref.update({ [c]: v }); }
    
    function injetarSem() {
        let v = parseFloat(document.getElementById('inGSem').value);
        db.runTransaction(async t => {
            const d = (await t.get(ref)).data();
            t.update(ref, { gSem: (d.gSem||0)+v, gMes: (d.gMes||0)+v });
        });
    }

    function zerar(m, g) { ref.update({ [m]: 0, [g]: 0 }); }

    function addCusto() {
        let n = document.getElementById('nCusto').value, v = document.getElementById('vCusto').value, t = document.getElementById('tipoCusto').value;
        ref.update({ lista: firebase.firestore.FieldValue.arrayUnion({n, v, t, pago: false, id: Date.now()}) });
    }

    function toggle(id) {
        ref.get().then(doc => {
            let l = doc.data().lista;
            let i = l.find(x => x.id === id);
            i.pago = !i.pago;
            ref.update({ lista: l });
        });
    }

    ref.onSnapshot(doc => {
        const d = doc.data() || { lista: [] };
        ['Sem','Mes','Ano'].forEach(p => {
            let g = d['g'+p]||0, m = d['m'+p]||0, s = g-m;
            let elG = document.getElementById('g'+p), elS = document.getElementById('s'+p);
            if(elG) elG.innerText = 'R$ '+g;
            if(elS) { elS.innerText = 'SAÚDE: R$ '+s; elS.className = 'saude ' + (s >= 0 ? 'pos' : 'neg'); }
        });
        document.getElementById('listaCustos').innerHTML = '';
        let tm = 0, ta = 0;
        (d.lista || []).forEach(i => {
            let div = document.createElement('div');
            div.className = 'item ' + (i.pago ? 'pago' : 'pendente');
            div.onclick = () => toggle(i.id);
            div.innerHTML = `<span>${i.n} - R$${i.v} (${i.t})</span> <span>${i.pago ? 'PAGO' : 'PENDENTE'}</span>`;
            document.getElementById('listaCustos').appendChild(div);
            if(!i.pago) { if(i.t==='mensal') tm += parseFloat(i.v); else ta += parseFloat(i.v); }
        });
        document.getElementById('totMensal').innerText = tm; document.getElementById('totAnual').innerText = ta;
    });
</script>
</body>
</html>
