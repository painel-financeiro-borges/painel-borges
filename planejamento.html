<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BORGES | COMMAND CENTER ELITE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #0a0a0a; --neon: #39ff14; --alert: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; box-shadow: 10px 10px 30px #000; }
        .num { font-size: 2.5rem; font-weight: 900; color: #fff; margin: 10px 0; }
        .saude { font-size: 1rem; font-weight: bold; }
        .pos { color: var(--neon); } .neg { color: var(--alert); }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon); border-radius: 8px; margin: 5px 0; }
        button { width: 100%; padding: 10px; cursor: pointer; border: none; font-weight: 900; border-radius: 8px; margin-top: 5px; text-transform: uppercase; }
        .btn-green { background: var(--neon); color: #000; }
        .btn-red { background: var(--alert); color: #fff; margin-top: 15px; }
        
        /* Lista de Custos Interativa */
        #listaCustos { cursor: grab; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #111; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid transparent; }
        .item.pago { border-left-color: var(--neon); color: var(--neon); }
        .item.pendente { border-left-color: var(--alert); color: var(--alert); }
        .controls { display: flex; gap: 5px; }
    </style>
</head>
<body>

<div class="grid">
    <div class="box">
        <h2>CICLO SEMANAL</h2>
        <div class="num" id="gSem">R$ 0</div>
        <div id="sSem" class="saude">SAÚDE: R$ 0</div>
        <input type="number" id="inMSem" placeholder="Meta">
        <button onclick="att('mSem', 'inMSem')">DEFINIR META</button>
        <input type="number" id="inGSem" placeholder="Ganho">
        <button class="btn-green" onclick="injetarSem()">INJETAR GANHO</button>
        <button class="btn-red" onclick="zerar('mSem', 'gSem')">ZERAR SEMANA</button>
    </div>

    <div class="box">
        <h2>CICLO MENSAL</h2>
        <div class="num" id="gMes">R$ 0</div>
        <div id="sMes" class="saude">SAÚDE: R$ 0</div>
        <input type="number" id="inMMes" placeholder="Meta">
        <button onclick="att('mMes', 'inMMes')">DEFINIR META</button>
        <button class="btn-red" onclick="zerar('mMes', 'gMes')">ZERAR MÊS</button>
    </div>

    <div class="box">
        <h2>CICLO ANUAL</h2>
        <div class="num" id="gAno">R$ 0</div>
        <input type="number" id="inMAno" placeholder="Meta">
        <button onclick="att('mAno', 'inMAno')">DEFINIR META</button>
        <input type="number" id="inGAno" placeholder="Injetar Ganho">
        <button class="btn-green" onclick="att('gAno', 'inGAno')">INJETAR GANHO</button>
        <button class="btn-red" onclick="zerar('mAno', 'gAno')">ZERAR ANO</button>
    </div>
</div>

<div class="box" style="margin-top:25px;">
    <h2>GESTÃO DE CUSTOS</h2>
    <input type="text" id="nCusto" placeholder="Nome">
    <input type="number" id="vCusto" placeholder="Valor">
    <select id="tipoCusto"><option value="mensal">Mensal</option><option value="anual">Anual</option></select>
    <button class="btn-green" onclick="addCusto()">ADICIONAR CUSTO</button>
    <h3>MENSAL PENDENTE: R$ <span id="totMensal">0</span> | ANUAL PENDENTE: R$ <span id="totAnual">0</span></h3>
    <div id="listaCustos"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const db = firebase.initializeApp({apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8", authDomain: "painel-financeiro-borges.firebaseapp.com", projectId: "painel-financeiro-borges", storageBucket: "painel-financeiro-borges.firebasestorage.app", messagingSenderId: "354997627208", appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"}).firestore();
    const ref = db.collection("planejamento_financeiro").doc("status_atual");

    // Inicializa SortableJS
    new Sortable(document.getElementById('listaCustos'), { 
        animation: 150, 
        onEnd: () => console.log("Ordem alterada") 
    });

    function att(c, id) { let v = parseFloat(document.getElementById(id).value); if(!isNaN(v)) ref.set({[c]: v}, {merge: true}); }
    
    function addCusto() {
        let n = document.getElementById('nCusto').value, v = parseFloat(document.getElementById('vCusto').value), t = document.getElementById('tipoCusto').value;
        if(n && v) ref.set({ lista: firebase.firestore.FieldValue.arrayUnion({n, v, t, pago: false, id: Date.now()}) }, {merge: true});
    }

    function editarCusto(id) {
        let novoNome = prompt("Novo Nome:");
        if(!novoNome) return;
        ref.get().then(doc => {
            let l = doc.data().lista;
            let i = l.find(x => x.id === id);
            i.n = novoNome;
            ref.update({ lista: l });
        });
    }

    function toggle(id) {
        ref.get().then(doc => {
            let l = doc.data().lista;
            let i = l.find(x => x.id === id);
            i.pago = !i.pago;
            ref.update({ lista: l });
        });
    }

    ref.onSnapshot(doc => {
        const d = doc.data() || { lista: [] };
        // Atualiza Cards
        ['Sem','Mes','Ano'].forEach(p => {
            let g = d['g'+p]||0, m = d['m'+p]||0, s = g-m;
            let elG = document.getElementById('g'+p), elS = document.getElementById('s'+p);
            if(elG) elG.innerText = 'R$ '+g;
            if(elS) { elS.innerText = 'SAÚDE: R$ '+s; elS.className = 'saude ' + (s >= 0 ? 'pos' : 'neg'); }
        });
        // Atualiza Lista
        document.getElementById('listaCustos').innerHTML = '';
        let tm = 0, ta = 0;
        (d.lista || []).forEach(i => {
            let div = document.createElement('div');
            div.className = 'item ' + (i.pago ? 'pago' : 'pendente');
            div.innerHTML = `<span>${i.n} - R$${i.v} (${i.t})</span> 
                             <div class="controls">
                                <button onclick="editarCusto(${i.id})">✏️</button>
                                <button onclick="toggle(${i.id})">${i.pago ? '✅' : '❌'}</button>
                             </div>`;
            document.getElementById('listaCustos').appendChild(div);
            if(!i.pago) { if(i.t==='mensal') tm += parseFloat(i.v); else ta += parseFloat(i.v); }
        });
        document.getElementById('totMensal').innerText = tm; document.getElementById('totAnual').innerText = ta;
    });
</script>
</body>
</html>
