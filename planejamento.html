<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BORGES | FINANCE COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f12; --glass: rgba(28, 28, 30, 0.8); --text: #ffffff; --green: #2ed573; --red: #ff4757; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .val { font-size: 40px; font-weight: 900; margin: 10px 0; }
        .input-box { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 8px; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--green); color: #000; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .pago { color: var(--green); } .pendente { color: var(--red); }
    </style>
</head>
<body>

<div class="grid">
    <!-- METAS DE GANHOS -->
    <div class="card">
        <h2>CICLOS DE GANHO</h2>
        <div id="statusGanhos"></div>
    </div>

    <!-- CUSTOS (MENSAL/ANUAL) -->
    <div class="card">
        <h2>GESTÃO DE DÉBITOS</h2>
        <input type="text" id="nCusto" class="input-box" placeholder="Nome do Custo">
        <input type="number" id="vCusto" class="input-box" placeholder="Valor">
        <select id="tipoCusto" class="input-box">
            <option value="mensal">CUSTO MENSAL</option>
            <option value="anual">CUSTO ANUAL</option>
        </select>
        <button class="btn btn-add" onclick="addCusto()">ADICIONAR CUSTO</button>
        
        <h3 style="margin-top:20px">MENSAL: <span id="totMensal">0</span></h3>
        <div id="listaMensal"></div>
        
        <h3 style="margin-top:20px">ANUAL: <span id="totAnual">0</span></h3>
        <div id="listaAnual"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const db = firebase.initializeApp({apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8", authDomain: "painel-financeiro-borges.firebaseapp.com", projectId: "painel-financeiro-borges", storageBucket: "painel-financeiro-borges.firebasestorage.app", messagingSenderId: "354997627208", appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"}).firestore();
    const ref = db.collection("planejamento_financeiro").doc("custos_lista");

    function addCusto() {
        let n = document.getElementById('nCusto').value;
        let v = parseFloat(document.getElementById('vCusto').value);
        let t = document.getElementById('tipoCusto').value;
        if(!n || !v) return;
        ref.update({ lista: firebase.firestore.FieldValue.arrayUnion({n, v, t, pago: false, id: Date.now()}) });
    }

    function togglePago(id) {
        ref.get().then(doc => {
            let lista = doc.data().lista;
            let item = lista.find(i => i.id === id);
            item.pago = !item.pago;
            ref.update({ lista: lista });
        });
    }

    ref.onSnapshot(doc => {
        const data = doc.data() || { lista: [] };
        let mens = 0, anu = 0;
        document.getElementById('listaMensal').innerHTML = '';
        document.getElementById('listaAnual').innerHTML = '';

        data.lista.forEach(i => {
            let div = document.createElement('div');
            div.className = 'item ' + (i.pago ? 'pago' : 'pendente');
            div.innerHTML = `<span>${i.n} (R$${i.v})</span> 
                             <button onclick="togglePago(${i.id})">${i.pago ? '✅' : '❌'}</button>`;
            
            if(i.t === 'mensal') { mens += i.pago ? 0 : parseFloat(i.v); document.getElementById('listaMensal').appendChild(div); }
            else { anu += i.pago ? 0 : parseFloat(i.v); document.getElementById('listaAnual').appendChild(div); }
        });
        document.getElementById('totMensal').innerText = 'R$ ' + mens;
        document.getElementById('totAnual').innerText = 'R$ ' + anu;
    });
</script>
</body>
</html>
