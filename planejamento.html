<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BORGES | PLANEJAMENTO FINANCEIRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #0a0a0a; --neon: #39ff14; --alert: #ff003c; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
        .title-main { text-align: center; font-size: 2.5rem; margin-bottom: 40px; color: var(--gold); 
                      text-shadow: 0 0 15px rgba(255,215,0,0.5); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); 
               box-shadow: 0 0 15px rgba(255,215,0,0.1), inset 0 0 10px rgba(0,0,0,0.5); }
        h2 { font-size: 0.8rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .num { font-size: 2.5rem; font-weight: 900; color: #fff; margin: 10px 0; }
        .saude { font-size: 1rem; font-weight: bold; }
        .pos { color: var(--neon); } .neg { color: var(--alert); }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon); border-radius: 8px; margin: 5px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; border: none; font-weight: 900; border-radius: 8px; margin-top: 5px; text-transform: uppercase; }
        .btn-green { background: var(--neon); color: #000; }
        .btn-red { background: var(--alert); color: #fff; margin-top: 15px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #111; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid var(--gold); }
        .sprint-card { display: flex; flex-direction: column; padding: 15px; background: #111; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid var(--gold); }
        h3 { font-size: 1.2rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin-top: 30px !important; margin-bottom: 15px !important; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        #listaCustosMensal, #listaCustosAnual { margin-bottom: 20px; padding: 10px; background: rgba(255, 215, 0, 0.05); border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.2); }
        .item.pago { background: rgba(57, 255, 20, 0.1); border-left-color: var(--neon); color: var(--neon); }
        .item.pendente { background: rgba(255, 0, 60, 0.1); border-left-color: var(--alert); color: var(--alert); }
        .controls { display: flex; gap: 5px; }
        .progress-bar { height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; width: 100%; }
        .progress-fill { height: 100%; background: var(--gold); }
    </style>
</head>
<body>

<h1 class="title-main">PLANEJAMENTO FINANCEIRO</h1>

<div class="grid">
    <div class="box">
        <h2>CICLO SEMANAL</h2>
        <div class="num" id="gSem">R$ 0</div>
        <div id="sSem" class="saude">SAÚDE: R$ 0</div>
        <input type="number" id="inMSem" placeholder="Meta">
        <button onclick="att('mSem', 'inMSem')">DEFINIR META</button>
        <input type="number" id="inGSem" placeholder="Ganho">
        <button class="btn-green" onclick="injetarSem()">INJETAR GANHO</button>
        <button class="btn-red" onclick="zerar('mSem', 'gSem')">ZERAR SEMANA</button>
    </div>

    <div class="box">
        <h2>CICLO MENSAL</h2>
        <div class="num" id="gMes">R$ 0</div>
        <div id="sMes" class="saude">SAÚDE: R$ 0</div>
        <input type="number" id="inMMes" placeholder="Meta">
        <button onclick="att('mMes', 'inMMes')">DEFINIR META</button>
        <button class="btn-red" onclick="zerar('mMes', 'gMes')">ZERAR MÊS</button>
    </div>

    <div class="box">
        <h2>CICLO ANUAL</h2>
        <div class="num" id="gAno">R$ 0</div>
        <div id="sAno" class="saude">SAÚDE: R$ 0</div>
        <input type="number" id="inMAno" placeholder="Meta">
        <button onclick="att('mAno', 'inMAno')">DEFINIR META</button>
        <input type="number" id="inGAno" placeholder="Injetar Ganho">
        <button class="btn-green" onclick="att('gAno', 'inGAno')">INJETAR GANHO</button>
        <button class="btn-red" onclick="zerar('mAno', 'gAno')">ZERAR ANO</button>
    </div>
</div>

<div class="grid" style="margin-top:20px;">
    <div class="box">
        <h2>GESTÃO DE CUSTOS</h2>
        <input type="text" id="nCusto" placeholder="Nome">
        <input type="number" id="vCusto" placeholder="Valor">
        <select id="tipoCusto"><option value="mensal">Mensal</option><option value="anual">Anual</option></select>
        <button class="btn-green" onclick="addCusto()">ADICIONAR CUSTO</button>
        <div style="margin-top:20px;">
            <h3>MENSAL</h3>
            <div id="listaCustosMensal"></div>
            <h3>ANUAL</h3>
            <div id="listaCustosAnual"></div>
        </div>
    </div>

    <div class="box">
        <h2>PLANEJAMENTO ESTRATÉGICO</h2>
        <input type="text" id="nSprint" placeholder="Objetivo">
        <input type="text" id="dInicio" placeholder="DD/MM/AAAA" maxlength="10" oninput="formatarData(this)">
        <input type="text" id="dFim" placeholder="DD/MM/AAAA" maxlength="10" oninput="formatarData(this)">
        <input type="number" id="mSprint" placeholder="Meta Ganho R$">
        <button class="btn-green" onclick="addSprint()">CRIAR OBJETIVO</button>
        <div id="listaSprints"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const db = firebase.initializeApp({apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8", authDomain: "painel-financeiro-borges.firebaseapp.com", projectId: "painel-financeiro-borges", storageBucket: "painel-financeiro-borges.firebasestorage.app", messagingSenderId: "354997627208", appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"}).firestore();
    const ref = db.collection("planejamento_financeiro").doc("status_atual");

    new Sortable(document.getElementById('listaCustosMensal'), { animation: 150 });
    new Sortable(document.getElementById('listaCustosAnual'), { animation: 150 });
    new Sortable(document.getElementById('listaSprints'), { animation: 150 });
    function att(c, id) { 
        let v = parseFloat(document.getElementById(id).value); 
        if(!isNaN(v)) {
            const mensagem = (c.startsWith('g')) ? "SUCESSO: Ganho injetado com êxito!" : "SUCESSO: Meta definida com êxito!";
            ref.set({[c]: v}, {merge: true}).then(() => {
                alert(mensagem);
            });
        }
    }
    
    function addSprint() {
        let n = document.getElementById('nSprint').value, 
            dI = document.getElementById('dInicio').value, 
            dF = document.getElementById('dFim').value, 
            m = parseFloat(document.getElementById('mSprint').value);
            
        if(n && dI.length === 10 && dF.length === 10 && m) { 
            ref.set({ sprints: firebase.firestore.FieldValue.arrayUnion({n, dI, dF, m, ganhoAtual: 0, id: Date.now()}) }, {merge: true})
            .then(() => alert("SUCESSO: Objetivo criado!"));
        } else {
            alert("ERRO: Verifique se as datas estão no formato DD/MM/AAAA");
        }
    }

    function removeSprint(id) {
        if(confirm("Tem certeza que deseja excluir este objetivo? Esta ação não pode ser desfeita.")) {
            ref.get().then(doc => {
                let s = doc.data().sprints.filter(x => x.id !== id);
                ref.update({ sprints: s });
            });
        }
    }

    function editarSprint(id) {
        ref.get().then(doc => {
            let s = doc.data().sprints;
            let i = s.find(x => x.id === id);
            let n = prompt("Nome:", i.n), dI = prompt("Data Início (AAAA-MM-DD):", i.dI), dF = prompt("Data Término (AAAA-MM-DD):", i.dF), m = prompt("Meta:", i.m);
            if(n && dI && dF && m) { 
                i.n = n; i.dI = dI; i.dF = dF; i.m = parseFloat(m); 
                ref.update({ sprints: s }); 
            }
        });
    }

    function injetarSem() {
        let v = parseFloat(document.getElementById('inGSem').value);
        if(!v) return;
        db.runTransaction(async t => {
            const d = (await t.get(ref)).data() || {};
            t.set(ref, { gSem: (d.gSem||0)+v, gMes: (d.gMes||0)+v }, {merge: true});
        }).then(() => {
            alert("SUCESSO: Ganho injetado nos ciclos Semanal e Mensal!");
        });
    }

    function zerar(m, g) { if(confirm("ZERAR?")) ref.set({[m]: 0, [g]: 0}, {merge: true}); }

    function addCusto() {
        let n = document.getElementById('nCusto').value, v = parseFloat(document.getElementById('vCusto').value), t = document.getElementById('tipoCusto').value;
        if(n && v) ref.set({ lista: firebase.firestore.FieldValue.arrayUnion({n, v, t, pago: false, id: Date.now()}) }, {merge: true});
    }

    function editarCusto(id) {
        ref.get().then(doc => {
            let l = doc.data().lista;
            let i = l.find(x => x.id === id);
            let n = prompt("Nome:", i.n), v = prompt("Valor:", i.v);
            if(n && v) { i.n = n; i.v = v; ref.update({ lista: l }); }
        });
    }

    function removeCusto(id) {
        if(confirm("Tem certeza que deseja excluir este custo?")) {
            ref.get().then(doc => {
                let l = doc.data().lista.filter(x => x.id !== id);
                ref.update({ lista: l });
            });
        }
    }
    
    function toggle(id) {
        ref.get().then(doc => {
            let l = doc.data().lista;
            let i = l.find(x => x.id === id);
            i.pago = !i.pago;
            ref.update({ lista: l });
        });
    }

    ref.onSnapshot(doc => {
        const d = doc.data() || { lista: [], sprints: [] };
        ['Sem','Mes','Ano'].forEach(p => {
            let g = d['g'+p]||0, m = d['m'+p]||0, s = g-m;
            let elG = document.getElementById('g'+p), elS = document.getElementById('s'+p);
            if(elG) elG.innerText = 'R$ '+g;
            if(elS) { elS.innerText = 'SAÚDE: R$ '+s; elS.className = 'saude ' + (s >= 0 ? 'pos' : 'neg'); }
        });
        
        document.getElementById('listaCustosMensal').innerHTML = '';
        document.getElementById('listaCustosAnual').innerHTML = '';
        
        (d.lista || []).forEach(i => {
            let div = document.createElement('div');
            div.className = 'item ' + (i.pago ? 'pago' : 'pendente');
            div.innerHTML = `<span>${i.n} - R$${i.v}</span> 
                             <div class="controls"><button onclick="editarCusto(${i.id})">✏️</button><button onclick="toggle(${i.id})">${i.pago ? '✅' : '❌'}</button><button onclick="removeCusto(${i.id})">🗑️</button></div>`;
            
            if(i.t === 'mensal') document.getElementById('listaCustosMensal').appendChild(div);
            else document.getElementById('listaCustosAnual').appendChild(div);
        });

        document.getElementById('listaSprints').innerHTML = '';
        (d.sprints || []).forEach(s => {
            let perc = Math.min(((s.ganhoAtual || 0) / s.m) * 100, 100);
            document.getElementById('listaSprints').innerHTML += `
                <div class="sprint-card" onclick="abrirCalendarioVisual([${JSON.stringify(s).replace(/"/g, "'")}])" style="cursor:pointer;">
                    <div style="display:flex; justify-content:space-between; width:100%;">
                        <span><strong>${s.n}</strong> | ${s.dI} a ${s.dF}</span>
                        <div class="controls">
                            <button onclick="event.stopPropagation(); adicionarGanhoSprint(${s.id})">💰</button>
                            <button onclick="event.stopPropagation(); editarSprint(${s.id})">✏️</button>
                            <button onclick="event.stopPropagation(); removeSprint(${s.id})">🗑️</button>
                        </div>
                    </div>
                    <div style="width:100%;">Meta: R$${s.m} | Atual: R$${s.ganhoAtual || 0}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div>
                </div>`;
        });
    });

    function adicionarGanhoSprint(id) {
        ref.get().then(doc => {
            let s = doc.data().sprints;
            let i = s.find(x => x.id === id);
            let novoGanho = prompt("Quanto ganhou para este objetivo?", i.ganhoAtual || 0);
            if (novoGanho !== null) {
                i.ganhoAtual = parseFloat(novoGanho);
                ref.update({ sprints: s });
            }
        });
    }

    function abrirCalendarioVisual(sprints) {
        const overlay = document.createElement('div');
        overlay.id = 'timelineVisual';
        overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:9999; padding:40px; box-sizing:border-box; color:white; font-family:Courier New; overflow-y:auto;';
        
       const hoje = new Date();
        const gerarDias = (y, m, diaHoje) => {
            const diasNoMes = new Date(y, m + 1, 0).getDate();
            let html = "";
            for(let i=1; i<=diasNoMes; i++) {
                const isHoje = i === diaHoje;
                const estilo = isHoje 
                    ? 'background:#39ff14; color:#000; font-weight:bold; border:1px solid #fff; box-shadow:0 0 10px #39ff14;' 
                    : 'border:1px solid #333; color:#aaa;';
                html += `<div style="${estilo} padding:8px; text-align:center; font-size:0.8rem; border-radius:4px;">${i}</div>`;
            }
            return html;
        };

        let timelineHTML = sprints.map(obj => {
            const progresso = Math.min(((obj.ganhoAtual || 0) / obj.m) * 100, 100);
            const corBarra = (obj.ganhoAtual >= obj.m) ? '#39ff14' : '#ff003c';
            return `
                <div style="margin-bottom:30px; border:2px solid #ffd700; padding:25px; border-radius:20px; background:linear-gradient(145deg, #111, #000); box-shadow: 0 0 15px rgba(255,215,0,0.3);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding:15px; background:rgba(255,215,0,0.1); border:1px solid #ffd700; border-radius:15px;">
                        <span style="color:#ffd700; font-weight:bold; font-size:1.5rem; text-transform:uppercase; text-shadow: 0 0 10px #ffd700;">${obj.n}</span>
                        <div style="text-align:right;">
                            <div style="font-size:0.9rem; color:#aaa;">META: R$${obj.m}</div>
                            <div style="font-size:2rem; font-weight:900; color:#39ff14; text-shadow: 0 0 10px #39ff14;">R$${obj.ganhoAtual || 0}</div>
                        </div>
                    </div>
                    <div style="height:15px; background:#222; border-radius:10px; overflow:hidden; margin-bottom:20px; border: 1px solid #444;">
                        <div style="height:100%; width:${progresso}%; background:${corBarra}; box-shadow: 0 0 10px ${corBarra};"></div>
                    </div>
                    <div onclick="const c = document.getElementById('contCalendar'); c.style.display = (c.style.display === 'none' || c.style.display === '') ? 'block' : 'none';" style="padding:15px; background:#1a1a1a; border-radius:10px; cursor:pointer; text-align:center; border:1px solid #ffd700; color:#ffd700; font-weight:bold; margin-bottom:10px;">
                        CALENDÁRIO ATIVO: ${hoje.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase()} (CLIQUE PARA OCULTAR/MOSTRAR)
                    </div>
                    <div id="contCalendar" style="display:none; padding:15px; background:#000; border:1px solid #ffd700; border-radius:10px;">
                        <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:5px; background:#222; border:1px solid #444;">${gerarDias(hoje.getFullYear(), hoje.getMonth(), hoje.getDate())}</div>
                    </div>
                </div>
            `;
        }).join('');

        overlay.innerHTML = `
            <div style="max-width:1000px; margin:0 auto; background:#050505; padding:30px; border-radius:20px; border:2px solid #ffd700;">
                <h2 style="color:#ffd700; text-align:center; margin-bottom:30px;">LINHA DO TEMPO FINANCEIRA</h2>
                ${timelineHTML}
                <button onclick="document.getElementById('timelineVisual').remove()" style="width:100%; padding:15px; background:#ff003c; border:none; color:white; cursor:pointer; font-weight:bold; border-radius:8px;">FECHAR VISUALIZAÇÃO</button>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    function formatarData(input) {
        let v = input.value.replace(/\D/g, ''); // Remove tudo que não é número
        if (v.length > 2) v = v.substring(0, 2) + '/' + v.substring(2);
        if (v.length > 5) v = v.substring(0, 5) + '/' + v.substring(5, 9);
        input.value = v;
    }
    
</script>
</body>
</html>
