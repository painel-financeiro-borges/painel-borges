<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BORGES | RADAR DE ATAQUE</title>
<style>
    :root { --preto: #000; --verde: #39ff14; --vermelho: #ff003c; --branco: #fff; }
    body { background: var(--preto); color: var(--branco); font-family: 'Courier New', monospace; padding: 20px; }
    .painel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .bloco { border: 2px solid #333; padding: 20px; border-radius: 10px; background: #0a0a0a; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 20px; }
    .valor { font-size: 35px; font-weight: 900; color: var(--verde); font-family: sans-serif; }
    .input-group { margin-top: 15px; }
    input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: #fff; margin: 5px 0; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: var(--verde); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 5px; }
    .badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #222; }
</style>
</head>
<body>

<h1 style="text-align: center; font-size: 20px; margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px;">
    💰 RADAR DE RECUPERAÇÃO FINANCEIRA
</h1>

<div class="painel-grid">
    <!-- SEMANA -->
    <div class="bloco">
        <h2>🗓️ CICLO SEMANAL</h2>
        <div class="badge">META: <span id="metaSem">0</span></div>
        <div class="valor" id="ganhoSem">R$ 0</div>
        <div class="input-group">
            <input type="number" id="inputSem" placeholder="Injetar valor (R$)">
            <button onclick="injetar('semana')">INJETAR GANHO</button>
        </div>
    </div>

    <!-- MÊS -->
    <div class="bloco">
        <h2>📊 CICLO MENSAL</h2>
        <div class="badge">META: <span id="metaMes">0</span></div>
        <div class="valor" id="ganhoMes">R$ 0</div>
        <div class="input-group">
            <input type="number" id="inputMes" placeholder="Injetar valor (R$)">
            <button onclick="injetar('mes')">INJETAR GANHO</button>
        </div>
    </div>

    <!-- CUSTOS E RESERVA -->
    <div class="bloco" style="border-color: var(--vermelho);">
        <h2 style="color: var(--vermelho);">⚠️ DÉBITO & CUSTOS</h2>
        <div class="valor" id="custos" style="color: var(--vermelho);">R$ 0</div>
        <div class="input-group">
            <input type="number" id="inputCustos" placeholder="Registrar custo">
            <button style="background: var(--vermelho);" onclick="injetar('custos')">REGISTRAR SAÍDA</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8", authDomain: "painel-financeiro-borges.firebaseapp.com", projectId: "painel-financeiro-borges", storageBucket: "painel-financeiro-borges.firebasestorage.app", messagingSenderId: "354997627208", appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("planejamento_financeiro").doc("status_atual");

    function injetar(tipo) {
        const val = parseFloat(document.getElementById('input' + tipo.charAt(0).toUpperCase() + tipo.slice(1)).value);
        if(!val) return;
        db.runTransaction(async t => {
            const doc = await t.get(docRef);
            let d = doc.exists ? doc.data() : { semana: 0, mes: 0, custos: 0 };
            d[tipo] = (d[tipo] || 0) + val;
            t.set(docRef, d);
        });
    }

    docRef.onSnapshot(doc => {
        if(doc.exists) {
            const d = doc.data();
            document.getElementById('ganhoSem').innerText = 'R$ ' + (d.semana || 0);
            document.getElementById('ganhoMes').innerText = 'R$ ' + (d.mes || 0);
            document.getElementById('custos').innerText = 'R$ ' + (d.custos || 0);
        }
    });
</script>
</body>
</html>
