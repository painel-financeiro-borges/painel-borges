<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BORGES | CONTROLE DE CICLOS</title>
<style>
    :root { --preto: #050505; --verde: #39ff14; --vermelho: #ff003c; --cinza: #222; }
    body { background: var(--preto); color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
    .painel { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .bloco { border: 1px solid var(--cinza); padding: 20px; border-radius: 12px; background: #0a0a0a; }
    .display { font-size: 24px; font-weight: 900; color: var(--verde); margin: 10px 0; }
    input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--cinza); color: #fff; margin-top: 5px; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
    .btn-injetar { background: var(--verde); }
    .btn-zerar { background: var(--vermelho); color: #fff; margin-top: 20px; }
</style>
</head>
<body>

<h1 style="text-align:center; font-size: 18px; margin-bottom: 30px;">CENTRAL DE PLANEJAMENTO</h1>

<div class="painel">
    <!-- SEMANAL -->
    <div class="bloco">
        <h2>🗓️ SEMANA</h2>
        <div>Meta: <span id="metaSem">0</span></div>
        <div class="display" id="ganhoSem">R$ 0</div>
        <input type="number" id="inMetaSem" placeholder="Definir nova meta semanal">
        <button class="btn-injetar" onclick="atualizar('metaSem', 'inMetaSem')">DEFINIR META</button>
        <input type="number" id="inGanhoSem" placeholder="Injetar ganho semanal">
        <button class="btn-injetar" onclick="atualizar('ganhoSem', 'inGanhoSem')">INJETAR GANHO</button>
        <button class="btn-zerar" onclick="zerar('metaSem', 'ganhoSem')">ZERAR SEMANA</button>
    </div>

    <!-- MENSAL -->
    <div class="bloco">
        <h2>📊 MÊS</h2>
        <div>Meta: <span id="metaMes">0</span></div>
        <div class="display" id="ganhoMes">R$ 0</div>
        <input type="number" id="inMetaMes" placeholder="Definir nova meta mensal">
        <button class="btn-injetar" onclick="atualizar('metaMes', 'inMetaMes')">DEFINIR META</button>
        <input type="number" id="inGanhoMes" placeholder="Injetar ganho mensal">
        <button class="btn-injetar" onclick="atualizar('ganhoMes', 'inGanhoMes')">INJETAR GANHO</button>
        <button class="btn-zerar" onclick="zerar('metaMes', 'ganhoMes')">ZERAR MÊS</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8", authDomain: "painel-financeiro-borges.firebaseapp.com", projectId: "painel-financeiro-borges", storageBucket: "painel-financeiro-borges.firebasestorage.app", messagingSenderId: "354997627208", appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("planejamento_financeiro").doc("status_atual");

    function atualizar(campo, inputId) {
        const val = parseFloat(document.getElementById(inputId).value);
        if(isNaN(val)) return;
        db.runTransaction(async t => {
            const doc = await t.get(docRef);
            let d = doc.exists ? doc.data() : { metaSem:0, ganhoSem:0, metaMes:0, ganhoMes:0 };
            d[campo] = (d[campo] || 0) + val;
            t.set(docRef, d);
        });
    }

    function zerar(metaCampo, ganhoCampo) {
        if(!confirm("Zerar este ciclo?")) return;
        let update = {}; update[metaCampo] = 0; update[ganhoCampo] = 0;
        docRef.update(update);
    }

    docRef.onSnapshot(doc => {
        if(doc.exists) {
            const d = doc.data();
            document.getElementById('metaSem').innerText = d.metaSem || 0;
            document.getElementById('ganhoSem').innerText = 'R$ ' + (d.ganhoSem || 0);
            document.getElementById('metaMes').innerText = d.metaMes || 0;
            document.getElementById('ganhoMes').innerText = 'R$ ' + (d.ganhoMes || 0);
        }
    });
</script>
</body>
</html>
