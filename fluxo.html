<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Painel Borges — Módulo Fluxo & Horizonte</title>

<style>
:root {
  --bg: #07040d;
  --card: rgba(22, 17, 39, 0.6);
  --border: rgba(160, 32, 240, 0.15);
  --text: #ffffff;
  --muted: #706594;
  --critico: #ff007f;
  --importante: #a020f0;
  --normal: #7b2cbf;
  --evento: #00f5ff;
  --concluido: #39ff14;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--bg);
  color: var(--text);
  padding-top: 60px;
  padding-bottom: 20px;
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background-color: rgba(7, 4, 13, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 10px;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
}

.topbar-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: 600;
}

.badge-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.badge-dot.critico { background-color: var(--critico); box-shadow: 0 0 8px var(--critico); }
.badge-dot.importante { background-color: var(--importante); box-shadow: 0 0 8px var(--importante); }
.badge-dot.normal { background-color: var(--normal); box-shadow: 0 0 8px var(--normal); }
.badge-dot.semdata { background-color: var(--muted); }

.container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 15px;
}

.section-title {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 700;
}

.calendar-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.05);
}

.calendar-scroll {
  overflow-x: auto;
  padding-bottom: 8px;
  -webkit-overflow-scrolling: touch;
}

.calendar-grid {
  display: grid;
  padding: 4px 0;
}

.day-cell {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.c-critico { 
  background: linear-gradient(135deg, #ff0066, var(--critico)) !important;
  box-shadow: 0 0 14px rgba(255, 0, 127, 0.65);
  border: 1px solid #ff80bf !important;
}

.c-importante { 
  background: linear-gradient(135deg, #bd53ed, var(--importante)) !important;
  box-shadow: 0 0 14px rgba(160, 32, 240, 0.65);
  border: 1px solid #e6b3ff !important;
}

.c-normal { 
  background: linear-gradient(135deg, #5a189a, var(--normal)) !important;
  box-shadow: 0 0 10px rgba(123, 44, 191, 0.5);
  border: 1px solid #b57cff !important;
}

.c-evento { 
  background: linear-gradient(135deg, #00bfff, var(--evento)) !important;
  box-shadow: 0 0 14px rgba(0, 245, 255, 0.65);
  border: 1px solid #b3ffff !important;
}

.c-concluido { 
  background: linear-gradient(135deg, #00ff00, var(--concluido)) !important;
  box-shadow: 0 0 14px rgba(57, 255, 20, 0.7);
  border: 1px solid #ccffcc !important;
}

.add-tab-btn {
  background: rgba(160, 32, 240, 0.1);
  border: 1px solid rgba(160, 32, 240, 0.4) !important;
  color: #00f5ff !important;
  box-shadow: 0 0 10px rgba(160, 32, 240, 0.15);
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.25s ease;
}

.add-tab-btn:hover {
  background: var(--importante);
  color: #fff !important;
  box-shadow: 0 0 18px rgba(160, 32, 240, 0.7);
  transform: translateY(-2px);
}

.add-tab-btn:active {
  transform: translateY(1px);
}

/* HORIZONTES DE TEMPO */
.horizon-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-top: 15px;
  padding-bottom: 5px;
}

.horizon-card {
  background: #1e293b;
  padding: 8px 14px;
  border-radius: 10px;
  min-width: 105px;
  text-align: center;
  flex-shrink: 0;
}

.horizon-card .title {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 700;
}

.horizon-card .counter {
  font-size: 18px;
  font-weight: 800;
  margin-top: 2px;
}

/* ==========================================================================
   SISTEMA DE ABAS (ESTILO CHROME BROWSER)
   ========================================================================== */
.tabs-wrapper {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 15px;
  overflow-x: auto;
}

.tabs-container {
  display: flex;
  gap: 4px;
  overflow-x: auto;
}

.tab-btn {
  background: #1e293b;
  color: var(--muted);
  border: none;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 12px 12px 0 0;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s ease;
}

.tab-btn.active {
  background: var(--card);
  color: var(--text);
  border-top: 2px solid var(--accent);
}

.tab-close {
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
}
.tab-close:hover { color: var(--critico); }

.add-tab-btn {
  background: transparent;
  color: var(--accent);
  border: none;
  padding: 10px 14px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

/* ==========================================================================
   WORKZONE: EDITOR ESTILO WHATSAPP
   ========================================================================== */
.editor-panel {
  background-color: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.editor-area {
  width: 100%;
  min-height: 250px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
}

/* Quick Input Box */
.quick-input-container {
  display: flex;
  gap: 8px;
  margin-top: 15px;
  border-top: 1px solid var(--border);
  padding-top: 15px;
}

.quick-input {
  flex: 1;
  background-color: #020617;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  color: var(--text);
  font-size: 15px;
  outline: none;
}

.quick-send-btn {
  background-color: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0 16px;
  font-weight: bold;
  cursor: pointer;
}

/* ==========================================================================
   MENU CONTEXTUAL (EXPEDIDOR HORIZONTE)
   ========================================================================== */
.context-menu {
  position: fixed;
  background: #1e293b;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: none;
  flex-direction: column;
  gap: 4px;
  z-index: 1000;
  min-width: 150px;
}

.context-item {
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.context-item:hover { background: var(--card); }

/* Responsividade de Toque para Mobile */
@media(max-width: 480px) {
  body { padding-top: 55px; }
  .editor-area { min-height: 300px; }
  .horizon-card { min-width: 90px; padding: 6px 10px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-badge"><div class="badge-dot critico"></div> <span id="lblCritico">0 Críticos</span></div>
  <div class="topbar-badge"><div class="badge-dot importante"></div> <span id="lblImportante">0 Imports.</span></div>
  <div class="topbar-badge"><div class="badge-dot normal"></div> <span id="lblNormal">0 Normais</span></div>
  <div class="topbar-badge"><div class="badge-dot semdata"></div> <span id="lblSemData">0 S/ Data</span></div>
</div>

<div class="container">

  <!-- SEÇÃO 1: ABAS ESTILO NAVEGADOR & ÁREA WHATSAPP (AGORA NO TOPO) -->
 <div class="section-title" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
  <span>Abas de Anotação Ativa</span>
  <span id="cloudStatus" style="font-size: 11px; font-weight: bold; color: var(--concluido); display: flex; align-items: center; gap: 5px; text-transform: none; transition: all 0.3s ease;">
    <span style="width: 8px; height: 8px; background-color: var(--concluido); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--concluido);" id="cloudLed"></span>
    Nuvem Sincronizada
  </span>
</div>
  
  <div class="tabs-wrapper">
    <div class="tabs-container" id="tabsContainer"></div>
    <button class="add-tab-btn" onclick="createNewTab()">+</button>
  </div>

  <div class="editor-panel" style="margin-bottom: 25px;">
    <!-- Editor Unificado Raw Text -->
    <textarea 
      id="mainEditor" 
      class="editor-area" 
      placeholder="Digite suas anotações aqui...&#10;Use hífens (-) para criar listas dinâmicas automáticas como no WhatsApp."
      oninput="handleEditorInput(this)"
    ></textarea>
    
    <!-- Caixa de Entrada Rápida de Captura Inteligente -->
    <div class="quick-input-container">
      <input type="text" id="quickBox" class="quick-input" placeholder="➕ Captura rápida (Ex: Comprar rodapé)" onkeydown="if(event.key==='Enter') dispatchQuickInput()" />
      <button class="quick-send-btn" onclick="dispatchQuickInput()">Ok</button>
    </div>
  </div>

  <!-- SEÇÃO 2: CALENDÁRIO DE PRIORIDADES & HORIZONTE (AGORA ABAIXO) -->
  <div class="section-title">Calendário de Prioridades & Horizonte</div>
  
  <div style="display: flex; gap: 8px; margin-bottom: 12px;">
    <button class="add-tab-btn" style="padding: 6px 12px; font-size: 12px; background: var(--card-bg);" onclick="mudarZoomCalendario('mes')">📅 Visão Mês</button>
    <button class="add-tab-btn" style="padding: 6px 12px; font-size: 12px; background: var(--card-bg);" onclick="mudarZoomCalendario('ano')">🗺️ Visão Ano/Semestre</button>
  </div>

  <div class="calendar-panel">
    <div class="calendar-scroll" style="overflow-x: auto; display: flex; padding-bottom: 10px; -webkit-overflow-scrolling: touch;">
      <div class="calendar-grid" id="githubGrid"></div>
    </div>
    
    <div class="horizon-row">
      <div class="horizon-card"><div class="title">Hoje</div><div class="counter" style="color:var(--critico)" id="hzHoje">0</div></div>
      <div class="horizon-card"><div class="title">Semana</div><div class="counter" style="color:var(--importante)" id="hzSemana">0</div></div>
      <div class="horizon-card"><div class="title">Mês</div><div class="counter" style="color:var(--normal)" id="hzMes">0</div></div>
      <div class="horizon-card"><div class="title">Semestre</div><div class="counter" style="color:var(--evento)" id="hzSemestre">0</div></div>
      <div class="horizon-card"><div class="title">Algum Dia</div><div class="counter" style="color:var(--muted)" id="hzAlgumDia">0</div></div>
    </div>
  </div>

</div>

<div class="context-menu" id="contextMenu">
  <div class="context-item" onclick="assignHorizon('Hoje')" style="color:var(--critico)">🔴 Hoje</div>
  <div class="context-item" onclick="assignHorizon('Semana')" style="color:var(--importante)">🟠 Semana</div>
  <div class="context-item" onclick="assignHorizon('Mês')" style="color:var(--normal)">🟡 Mês</div>
  <div class="context-item" onclick="assignHorizon('Semestre')" style="color:var(--evento)">🔵 Semestre</div>
  <div class="context-item" onclick="assignHorizon('Algum Dia')" style="color:var(--muted)">📥 Algum Dia</div>
</div>

<script>
/* ==========================================================================
   ESTADO GLOBAL COMPACTO CORRIGIDO (V2)
   ========================================================================== */
let appState = {
  currentTabId: 'planejamento',
  topbarMetrics: { criticos: 3, importantes: 12, normais: 27, semData: 14 },
  horizontes: { Hoje: 3, Semana: 7, Mês: 15, Semestre: 22, AlgumDia: 41 },
  abas: [
    { id: 'planejamento', titulo: 'Planejamento', conteudo: '• Juntar para apartamento\n• Organizar compras previstas' },
    { id: 'afazeres', titulo: 'Afazeres', conteudo: '• Marcar consulta\n• Contrato Juninho\n• Cobrar GOI' },
    { id: 'compras', titulo: 'Compras', conteudo: '• Argamassa\n• Massa Quartzolit\n• Rodapé\n• Torneira banheiro' }
  ]
};

let selectedLineText = ""; 

/* ==========================================================================
   INICIALIZAÇÃO & RENDERERS ATIVOS
   ========================================================================== */
function init() {
  loadLocalStorage();
  renderGithubCalendar();
  renderTabs();
  selectTab(appState.currentTabId);
  updateMetricsUI();
  setupContextMenus();
}

function updateMetricsUI() {
  document.getElementById('lblCritico').textContent = `${appState.topbarMetrics.criticos} Críticos`;
  document.getElementById('lblImportante').textContent = `${appState.topbarMetrics.importantes} Imports.`;
  document.getElementById('lblNormal').textContent = `${appState.topbarMetrics.normais} Normais`;
  document.getElementById('lblSemData').textContent = `${appState.topbarMetrics.semData} S/ Data`;

  document.getElementById('hzHoje').textContent = appState.horizontes.Hoje;
  document.getElementById('hzSemana').textContent = appState.horizontes.Semana;
  document.getElementById('hzMes').textContent = appState.horizontes.Mês;
  document.getElementById('hzSemestre').textContent = appState.horizontes.Semestre;
  document.getElementById('hzAlgumDia').textContent = appState.horizontes.AlgumDia;
}

/* ==========================================================================
   ENGINE DO CALENDÁRIO DINÂMICO & ZOOM MÓVEL (V2 COMPATÍVEL)
   ========================================================================== */
let calendarMode = 'mes';
const DATA_BASE = { ano: 2026, mes: 5 };
const NOMES_MESES = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
const DIAS_SEMANA = ["D", "S", "T", "Q", "Q", "S", "S"];

if (!appState.eventos) {
  appState.eventos = [
    { data: "2026-06-17", tipo: "hoje", titulo: "Hoje" },
    { data: "2026-06-25", tipo: "evento", titulo: "Compromisso Salvador" },
    { data: "2026-06-30", tipo: "evento", titulo: "Compromisso Salvador" }
  ];
}

window.mudarZoomCalendario = function(modo) {
  calendarMode = modo;
  console.log(`🔍 Alternando lente do calendário para modo: ${modo}`);
  renderGithubCalendar();
};

window.renderGithubCalendar = function() {
  const container = document.getElementById('githubGrid');
  if (!container) return;
  container.innerHTML = '';

  if (calendarMode === 'mes') {
    container.style.display = 'grid';
    container.style.gridAutoFlow = 'row';
    container.style.gridTemplateColumns = 'repeat(7, 1fr)';
    container.style.gridTemplateRows = 'auto';
    container.style.gap = '8px';
    container.style.width = '100%';

    DIAS_SEMANA.forEach(d => {
      const dayLabel = document.createElement('div');
      dayLabel.style.cssText = 'color: var(--muted); text-align: center; font-size: 11px; font-weight: bold; padding-bottom: 5px;';
      dayLabel.innerText = d;
      container.appendChild(dayLabel);
    });

    const primeiroDiaSemana = new Date(DATA_BASE.ano, DATA_BASE.mes, 1).getDay();
    const totalDiasMes = new Date(DATA_BASE.ano, DATA_BASE.mes + 1, 0).getDate();

    for (let i = 0; i < primeiroDiaSemana; i++) {
      const emptyCell = document.createElement('div');
      container.appendChild(emptyCell);
    }

    for (let dia = 1; dia <= totalDiasMes; dia++) {
      const dayCell = document.createElement('div');
      const dataString = `${DATA_BASE.ano}-${String(DATA_BASE.mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
      
      dayCell.style.cssText = 'aspect-ratio: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.2s ease;';
      dayCell.innerText = dia;

      const eventoItem = appState.eventos.find(e => e.data === dataString);
      if (eventoItem) {
        if (eventoItem.tipo === 'hoje') {
          dayCell.className = 'day-cell c-concluido';
          dayCell.style.color = '#000';
        } else if (eventoItem.tipo === 'evento') {
          dayCell.className = 'day-cell c-evento';
          dayCell.style.color = '#000';
        }
      } else {
        dayCell.className = 'day-cell';
      }

      container.appendChild(dayCell);
    }
  } else {
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    container.style.gap = '12px';
    container.style.width = '100%';

    NOMES_MESES.forEach((nomeMes, indexMes) => {
      const row = document.createElement('div');
      row.style.cssText = 'display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.01); padding: 6px 8px; border-radius: 8px; border-left: 3px solid rgba(160,32,240,0.3); width: 100%;';

      const label = document.createElement('div');
      label.style.cssText = 'width: 45px; font-size: 11px; font-weight: bold; color: var(--muted); text-transform: uppercase; text-align: left;';
      label.innerText = nomeMes.substring(0, 3);
      row.appendChild(label);

      const dotsContainer = document.createElement('div');
      dotsContainer.style.cssText = 'display: flex; gap: 3px; flex-wrap: wrap; flex: 1;';

      const totalDias = new Date(DATA_BASE.ano, indexMes + 1, 0).getDate();

      for (let dia = 1; dia <= totalDias; dia++) {
        const dot = document.createElement('div');
        const dataString = `${DATA_BASE.ano}-${String(indexMes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
        
        dot.style.cssText = 'width: 6px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 1px; transition: all 0.2s;';

        const eventoItem = appState.eventos.find(e => e.data === dataString);
        if (eventoItem) {
          if (eventoItem.tipo === 'hoje') {
            dot.style.background = '#39ff14';
            dot.style.boxShadow = '0 0 6px #39ff14';
          } else {
            dot.style.background = '#00f5ff';
            dot.style.boxShadow = '0 0 6px #00f5ff';
          }
          dot.style.width = '8px';
          dot.style.height = '8px';
        }

        dotsContainer.appendChild(dot);
      }

      row.appendChild(dotsContainer);
      container.appendChild(row);
    });
  }
};
  
function renderTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  
  if (appState.abas.length === 0) {
    container.innerHTML = '<span style="color:var(--muted); font-size:12px; padding:10px;">Sem blocos ativos. Crie um no [+]</span>';
    return;
  }
  
  appState.abas.forEach(aba => {
    const btn = document.createElement('button');
    btn.className = `tab-btn ${aba.id === appState.currentTabId ? 'active' : ''}`;
    
    // Um clique seleciona a aba
    btn.onclick = () => selectTab(aba.id);
    
    // DUPLO CLIQUE EDITA O NOME DA ABA (MUITO RÁPIDO)
    btn.ondblclick = (e) => {
      e.stopPropagation();
      editTabTitle(aba.id);
    };
    
    const titleSpan = document.createElement('span');
    titleSpan.textContent = aba.titulo;
    
    const closeSpan = document.createElement('span');
    closeSpan.className = 'tab-close';
    closeSpan.innerHTML = ' &times;';
    
    // O CLIQUE NO X AGORA APAGA DE VERDADE
    closeSpan.onclick = (e) => {
      e.stopPropagation(); // Impede de ativar a aba ao clicar no X
      deleteTab(aba.id);
    };
    
    btn.appendChild(titleSpan);
    btn.appendChild(closeSpan);
    container.appendChild(btn);
  });
}

function editTabTitle(id) {
  const target = appState.abas.find(a => a.id === id);
  if(!target) return;
  
  const novoNome = prompt("Editar nome do Bloco Ativo:", target.titulo);
  if(novoNome && novoNome.trim() !== "") {
    target.titulo = novoNome.trim();
    saveLocalStorage();
    renderTabs();
  }
}

function selectTab(id) {
  if (appState.abas.length === 0) {
    document.getElementById('mainEditor').value = '';
    appState.currentTabId = '';
    renderTabs();
    return;
  }

  const target = appState.abas.find(a => a.id === id);
  const editor = document.getElementById('mainEditor');
  
  if(target) {
    appState.currentTabId = id;
    editor.value = target.conteudo;
  } else {
    appState.currentTabId = appState.abas[0].id;
    editor.value = appState.abas[0].conteudo;
  }
  
  renderTabs();
  saveLocalStorage();
}

function createNewTab() {
  const nome = prompt("Nome do Bloco Ativo / Aba:");
  if(!nome || nome.trim() === "") return;
  
  // Cria um ID único limpo baseado no timestamp para evitar conflito se tiver nomes iguais
  const id = 'aba_' + Date.now();
  
  appState.abas.push({
    id: id,
    titulo: nome.trim(),
    conteudo: ''
  });
  
  selectTab(id);
}

function deleteTab(id) {
  const target = appState.abas.find(a => a.id === id);
  if(!target) return;

  if(confirm(`Deseja apagar o bloco "${target.titulo}" e todas as suas anotações permanentemente?`)) {
    appState.abas = appState.abas.filter(a => a.id !== id);
    
    if(appState.currentTabId === id) {
      appState.currentTabId = appState.abas.length > 0 ? appState.abas[0].id : '';
    }
    
    saveLocalStorage();
    selectTab(appState.currentTabId);
  }
}

/* ==========================================================================
   PROCESSAMENTO DE SINTAXE DE TEXTO (ESTILO COMPORTAMENTO WHATSAPP)
   ========================================================================== */
function handleEditorInput(textarea) {
  let value = textarea.value;
  const cursorPosition = textarea.selectionStart;
  
  // Captura o padrão de digitação do WhatsApp: Tracinho (-) seguido de espaço ' '
  if (value.substring(cursorPosition - 2, cursorPosition) === '- ') {
    const textBefore = value.substring(0, cursorPosition - 2);
    const textAfter = value.substring(cursorPosition);
    
    // Substitui pelo marcador limpo circular de lista
    textarea.value = textBefore + '• ' + textAfter;
    textarea.selectionStart = textarea.selectionEnd = cursorPosition;
  }
  
  // Salva o estado em tempo real no buffer da aba
  const current = appState.abas.find(a => a.id === appState.currentTabId);
  if(current) {
    current.conteudo = textarea.value;
    saveLocalStorage();
  }
}

/* CAIXA DE ENTRADA RÁPIDA DE CAPTURA DE ITENS */
function dispatchQuickInput() {
  const box = document.getElementById('quickBox');
  const txt = box.value.trim();
  if(!txt) return;
  
  const editor = document.getElementById('mainEditor');
  const formatado = `• ${txt}`;
  
  if(editor.value) {
    editor.value += `\n${formatado}`;
  } else {
    editor.value = formatado;
  }
  
  box.value = '';
  handleEditorInput(editor);
  editor.scrollTop = editor.scrollHeight; // Rola o editor pro final igual uma conversa
}

/* ==========================================================================
   COMPORTAMENTO DE ENVIO EXPEDIDO (PRESIONAR / CLIQUE CONTEXTUAL)
   ========================================================================== */
function setupContextMenus() {
  const editor = document.getElementById('mainEditor');
  const menu = document.getElementById('contextMenu');
  
  // Disparador simplificado para Desktop e Mobile através de clique com botão direito ou seleção prolongada
  editor.addEventListener('contextmenu', function(e) {
    const selection = window.getSelection().toString().trim() || getLineAtCursor(editor);
    if(selection && selection !== "•" && selection !== "-") {
      e.preventDefault();
      selectedLineText = selection.replace(/[•-]\s*/, ""); // Limpa marcadores
      
      menu.style.display = 'flex';
      menu.style.left = `${Math.min(e.clientX, window.innerWidth - 160)}px`;
      menu.style.top = `${Math.min(e.clientY, window.innerHeight - 220)}px`;
    }
  });

  // Fecha menu ao tocar fora
  document.addEventListener('click', function(e) {
    if(!menu.contains(e.target)) {
      menu.style.display = 'none';
    }
  });
}

function getLineAtCursor(textarea) {
  const text = textarea.value;
  const selStart = textarea.selectionStart;
  const startPos = text.lastIndexOf('\n', selStart - 1) + 1;
  let endPos = text.indexOf('\n', selStart);
  if (endPos === -1) endPos = text.length;
  return text.substring(startPos, endPos).trim();
}

function assignHorizon(horizonName) {
  // Converte a propriedade para o padrão camelCase do objeto state
  const key = horizonName.replace(/\s+/g, '');
  if(appState.horizontes[key] !== undefined) {
    appState.horizontes[key]++;
    appState.topbarMetrics.semData = Math.max(0, appState.topbarMetrics.semData - 1);
    
    // Atualiza contadores visuais superiores na hora
    if(horizonName === 'Hoje') appState.topbarMetrics.criticos++;
    if(horizonName === 'Semana') appState.topbarMetrics.importantes++;
    
    updateMetricsUI();
    saveLocalStorage();
    alert(`"${selectedLineText}" enviado para o horizonte: ${horizonName}`);
  }
  document.getElementById('contextMenu').style.display = 'none';
}

</script>

 // 3. Métodos Globais de Transmissão de Dados com LED Inteligente
  window.saveLocalStorage = async function() {

  window.loadLocalStorage = function() {
    // Escuta ativa em tempo real multidispositivos

      if (docSnap.exists) {
        const cloudData = docSnap.data();
        const currentTabBackup = appState.currentTabId;
        
        appState = cloudData;
        
        if (currentTabBackup && appState.abas.some(a => a.id === currentTabBackup)) {

        // Sincroniza o editor sem interromper a digitação do cursor
        const editor = document.getElementById('mainEditor');
        const activeAba = appState.abas.find(a => a.id === appState.currentTabId);
        if (activeAba && editor.value !== activeAba.conteudo) {
          const start = editor.selectionStart;
          const end = editor.selectionEnd;
          editor.value = activeAba.conteudo;
          editor.setSelectionRange(start, end);
        }
      } else {
        console.log("Nenhum dado na nuvem. Gerando primeiro registro...");
        window.saveLocalStorage();
      }
    }, (error) => {

    });
  };
