<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Painel Borges — Módulo Fluxo & Horizonte</title>

<style>
:root {
  --bg: #020617;
  --card: #0f172a;
  --border: #1e293b;
  --text: #f8fafc;
  --muted: #64748b;
  --accent: #3b82f6;
  
  /* Cores de Carga Mental/Prioridade */
  --critico: #ef4444;
  --importante: #f97316;
  --normal: #eab308;
  --evento: #06b6d4;
  --concluido: #22c55e;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background-color: var(--bg);
  color: var(--text);
  padding-top: 60px; /* Espaço para o Topbar fixo */
  padding-bottom: 20px;
}

/* ==========================================================================
   TOPBAR FIXO (MÉTRICA DE CONTROLE)
   ========================================================================== */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  background-color: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 10px;
  z-index: 100;
}

.topbar-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-weight: 600;
}

.badge-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.badge-dot.critico { background-color: var(--critico); }
.badge-dot.importante { background-color: var(--importante); }
.badge-dot.normal { background-color: var(--normal); }
.badge-dot.semdata { background-color: var(--muted); }

/* ==========================================================================
   CONTAINER PRINCIPAL
   ========================================================================== */
.container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 15px;
}

.section-title {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 700;
}

/* ==========================================================================
   CALENDÁRIO GIGANTE (ESTILO GITHUB)
   ========================================================================== */
.calendar-panel {
  background-color: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 20px;
}

.calendar-scroll {
  overflow-x: auto;
  padding-bottom: 5px;
}

.calendar-grid {
  display: grid;
  grid-auto-flow: column;
  grid-template-rows: repeat(7, 10px);
  grid-auto-columns: 10px;
  gap: 3px;
  width: max-content;
  padding: 5px 0;
}
.day-cell {
  width: 10px;
  height: 10px;
  background-color: #1e293b;
  border-radius: 2px;
  cursor: pointer;
}

/* Classes de Carga Ativa no Calendário */
.day-cell.c-critico { background-color: var(--critico); }
.day-cell.c-importante { background-color: var(--importante); }
.day-cell.c-normal { background-color: var(--normal); }
.day-cell.c-evento { background-color: var(--evento); }
.day-cell.c-concluido { background-color: var(--concluido); }

/* HORIZONTES DE TEMPO */
.horizon-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin-top: 15px;
  padding-bottom: 5px;
}

.horizon-card {
  background: #1e293b;
  padding: 8px 14px;
  border-radius: 10px;
  min-width: 105px;
  text-align: center;
  flex-shrink: 0;
}

.horizon-card .title {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 700;
}

.horizon-card .counter {
  font-size: 18px;
  font-weight: 800;
  margin-top: 2px;
}

/* ==========================================================================
   SISTEMA DE ABAS (ESTILO CHROME BROWSER)
   ========================================================================== */
.tabs-wrapper {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  margin-bottom: 15px;
  overflow-x: auto;
}

.tabs-container {
  display: flex;
  gap: 4px;
  overflow-x: auto;
}

.tab-btn {
  background: #1e293b;
  color: var(--muted);
  border: none;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 12px 12px 0 0;
  cursor: pointer;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s ease;
}

.tab-btn.active {
  background: var(--card);
  color: var(--text);
  border-top: 2px solid var(--accent);
}

.tab-close {
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
}
.tab-close:hover { color: var(--critico); }

.add-tab-btn {
  background: transparent;
  color: var(--accent);
  border: none;
  padding: 10px 14px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

/* ==========================================================================
   WORKZONE: EDITOR ESTILO WHATSAPP
   ========================================================================== */
.editor-panel {
  background-color: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.editor-area {
  width: 100%;
  min-height: 250px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
}

/* Quick Input Box */
.quick-input-container {
  display: flex;
  gap: 8px;
  margin-top: 15px;
  border-top: 1px solid var(--border);
  padding-top: 15px;
}

.quick-input {
  flex: 1;
  background-color: #020617;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  color: var(--text);
  font-size: 15px;
  outline: none;
}

.quick-send-btn {
  background-color: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0 16px;
  font-weight: bold;
  cursor: pointer;
}

/* ==========================================================================
   MENU CONTEXTUAL (EXPEDIDOR HORIZONTE)
   ========================================================================== */
.context-menu {
  position: fixed;
  background: #1e293b;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: none;
  flex-direction: column;
  gap: 4px;
  z-index: 1000;
  min-width: 150px;
}

.context-item {
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.context-item:hover { background: var(--card); }

/* Responsividade de Toque para Mobile */
@media(max-width: 480px) {
  body { padding-top: 55px; }
  .editor-area { min-height: 300px; }
  .horizon-card { min-width: 90px; padding: 6px 10px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-badge"><div class="badge-dot critico"></div> <span id="lblCritico">0 Críticos</span></div>
  <div class="topbar-badge"><div class="badge-dot importante"></div> <span id="lblImportante">0 Imports.</span></div>
  <div class="topbar-badge"><div class="badge-dot normal"></div> <span id="lblNormal">0 Normais</span></div>
  <div class="topbar-badge"><div class="badge-dot semdata"></div> <span id="lblSemData">0 S/ Data</span></div>
</div>

<div class="container">

  <!-- SEÇÃO 1: ABAS ESTILO NAVEGADOR & ÁREA WHATSAPP (AGORA NO TOPO) -->
  <div class="section-title">Abas de Anotação Ativa</div>
  
  <div class="tabs-wrapper">
    <div class="tabs-container" id="tabsContainer"></div>
    <button class="add-tab-btn" onclick="createNewTab()">+</button>
  </div>

  <div class="editor-panel" style="margin-bottom: 25px;">
    <!-- Editor Unificado Raw Text -->
    <textarea 
      id="mainEditor" 
      class="editor-area" 
      placeholder="Digite suas anotações aqui...&#10;Use hífens (-) para criar listas dinâmicas automáticas como no WhatsApp."
      oninput="handleEditorInput(this)"
    ></textarea>
    
    <!-- Caixa de Entrada Rápida de Captura Inteligente -->
    <div class="quick-input-container">
      <input type="text" id="quickBox" class="quick-input" placeholder="➕ Captura rápida (Ex: Comprar rodapé)" onkeydown="if(event.key==='Enter') dispatchQuickInput()" />
      <button class="quick-send-btn" onclick="dispatchQuickInput()">Ok</button>
    </div>
  </div>

  <!-- SEÇÃO 2: CALENDÁRIO DE PRIORIDADES & HORIZONTE (AGORA ABAIXO) -->
  <div class="section-title">Calendário de Prioridades & Horizonte</div>
  
  <div style="display: flex; gap: 8px; margin-bottom: 12px;">
    <button class="add-tab-btn" style="padding: 6px 12px; font-size: 12px; background: var(--card-bg);" onclick="mudarZoomCalendario('mes')">📅 Visão Mês</button>
    <button class="add-tab-btn" style="padding: 6px 12px; font-size: 12px; background: var(--card-bg);" onclick="mudarZoomCalendario('ano')">🗺️ Visão Ano/Semestre</button>
  </div>

  <div class="calendar-panel">
    <div class="calendar-scroll" style="overflow-x: auto; display: flex; padding-bottom: 10px; -webkit-overflow-scrolling: touch;">
      <div class="calendar-grid" id="githubGrid"></div>
    </div>
    
    <div class="horizon-row">
      <div class="horizon-card"><div class="title">Hoje</div><div class="counter" style="color:var(--critico)" id="hzHoje">0</div></div>
      <div class="horizon-card"><div class="title">Semana</div><div class="counter" style="color:var(--importante)" id="hzSemana">0</div></div>
      <div class="horizon-card"><div class="title">Mês</div><div class="counter" style="color:var(--normal)" id="hzMes">0</div></div>
      <div class="horizon-card"><div class="title">Semestre</div><div class="counter" style="color:var(--evento)" id="hzSemestre">0</div></div>
      <div class="horizon-card"><div class="title">Algum Dia</div><div class="counter" style="color:var(--muted)" id="hzAlgumDia">0</div></div>
    </div>
  </div>

</div>

<div class="context-menu" id="contextMenu">
  <div class="context-item" onclick="assignHorizon('Hoje')" style="color:var(--critico)">🔴 Hoje</div>
  <div class="context-item" onclick="assignHorizon('Semana')" style="color:var(--importante)">🟠 Semana</div>
  <div class="context-item" onclick="assignHorizon('Mês')" style="color:var(--normal)">🟡 Mês</div>
  <div class="context-item" onclick="assignHorizon('Semestre')" style="color:var(--evento)">🔵 Semestre</div>
  <div class="context-item" onclick="assignHorizon('Algum Dia')" style="color:var(--muted)">📥 Algum Dia</div>
</div>

<script>
/* ==========================================================================
   ESTADO GLOBAL COMPACTO CORRIGIDO (V2)
   ========================================================================== */
let appState = {
  currentTabId: 'planejamento',
  topbarMetrics: { criticos: 3, importantes: 12, normais: 27, semData: 14 },
  horizontes: { Hoje: 3, Semana: 7, Mês: 15, Semestre: 22, AlgumDia: 41 },
  abas: [
    { id: 'planejamento', titulo: 'Planejamento', conteudo: '• Juntar para apartamento\n• Organizar compras previstas' },
    { id: 'afazeres', titulo: 'Afazeres', conteudo: '• Marcar consulta\n• Contrato Juninho\n• Cobrar GOI' },
    { id: 'compras', titulo: 'Compras', conteudo: '• Argamassa\n• Massa Quartzolit\n• Rodapé\n• Torneira banheiro' }
  ]
};

let selectedLineText = ""; 

/* ==========================================================================
   INICIALIZAÇÃO & RENDERERS ATIVOS
   ========================================================================== */
function init() {
  loadLocalStorage();
  renderGithubCalendar();
  renderTabs();
  selectTab(appState.currentTabId);
  updateMetricsUI();
  setupContextMenus();
}

function updateMetricsUI() {
  document.getElementById('lblCritico').textContent = `${appState.topbarMetrics.criticos} Críticos`;
  document.getElementById('lblImportante').textContent = `${appState.topbarMetrics.importantes} Imports.`;
  document.getElementById('lblNormal').textContent = `${appState.topbarMetrics.normais} Normais`;
  document.getElementById('lblSemData').textContent = `${appState.topbarMetrics.semData} S/ Data`;

  document.getElementById('hzHoje').textContent = appState.horizontes.Hoje;
  document.getElementById('hzSemana').textContent = appState.horizontes.Semana;
  document.getElementById('hzMes').textContent = appState.horizontes.Mês;
  document.getElementById('hzSemestre').textContent = appState.horizontes.Semestre;
  document.getElementById('hzAlgumDia').textContent = appState.horizontes.AlgumDia;
}

function renderTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  
  if (appState.abas.length === 0) {
    container.innerHTML = '<span style="color:var(--muted); font-size:12px; padding:10px;">Sem blocos ativos. Crie um no [+]</span>';
    return;
  }
  
  appState.abas.forEach(aba => {
    const btn = document.createElement('button');
    btn.className = `tab-btn ${aba.id === appState.currentTabId ? 'active' : ''}`;
    
    // Um clique seleciona a aba
    btn.onclick = () => selectTab(aba.id);
    
    // DUPLO CLIQUE EDITA O NOME DA ABA (MUITO RÁPIDO)
    btn.ondblclick = (e) => {
      e.stopPropagation();
      editTabTitle(aba.id);
    };
    
    const titleSpan = document.createElement('span');
    titleSpan.textContent = aba.titulo;
    
    const closeSpan = document.createElement('span');
    closeSpan.className = 'tab-close';
    closeSpan.innerHTML = ' &times;';
    
    // O CLIQUE NO X AGORA APAGA DE VERDADE
    closeSpan.onclick = (e) => {
      e.stopPropagation(); // Impede de ativar a aba ao clicar no X
      deleteTab(aba.id);
    };
    
    btn.appendChild(titleSpan);
    btn.appendChild(closeSpan);
    container.appendChild(btn);
  });
}

function editTabTitle(id) {
  const target = appState.abas.find(a => a.id === id);
  if(!target) return;
  
  const novoNome = prompt("Editar nome do Bloco Ativo:", target.titulo);
  if(novoNome && novoNome.trim() !== "") {
    target.titulo = novoNome.trim();
    saveLocalStorage();
    renderTabs();
  }
}

function selectTab(id) {
  if (appState.abas.length === 0) {
    document.getElementById('mainEditor').value = '';
    appState.currentTabId = '';
    renderTabs();
    return;
  }

  const target = appState.abas.find(a => a.id === id);
  const editor = document.getElementById('mainEditor');
  
  if(target) {
    appState.currentTabId = id;
    editor.value = target.conteudo;
  } else {
    appState.currentTabId = appState.abas[0].id;
    editor.value = appState.abas[0].conteudo;
  }
  
  renderTabs();
  saveLocalStorage();
}

function createNewTab() {
  const nome = prompt("Nome do Bloco Ativo / Aba:");
  if(!nome || nome.trim() === "") return;
  
  // Cria um ID único limpo baseado no timestamp para evitar conflito se tiver nomes iguais
  const id = 'aba_' + Date.now();
  
  appState.abas.push({
    id: id,
    titulo: nome.trim(),
    conteudo: ''
  });
  
  selectTab(id);
}

function deleteTab(id) {
  const target = appState.abas.find(a => a.id === id);
  if(!target) return;

  if(confirm(`Deseja apagar o bloco "${target.titulo}" e todas as suas anotações permanentemente?`)) {
    appState.abas = appState.abas.filter(a => a.id !== id);
    
    if(appState.currentTabId === id) {
      appState.currentTabId = appState.abas.length > 0 ? appState.abas[0].id : '';
    }
    
    saveLocalStorage();
    selectTab(appState.currentTabId);
  }
}

/* ==========================================================================
   PROCESSAMENTO DE SINTAXE DE TEXTO (ESTILO COMPORTAMENTO WHATSAPP)
   ========================================================================== */
function handleEditorInput(textarea) {
  let value = textarea.value;
  const cursorPosition = textarea.selectionStart;
  
  // Captura o padrão de digitação do WhatsApp: Tracinho (-) seguido de espaço ' '
  if (value.substring(cursorPosition - 2, cursorPosition) === '- ') {
    const textBefore = value.substring(0, cursorPosition - 2);
    const textAfter = value.substring(cursorPosition);
    
    // Substitui pelo marcador limpo circular de lista
    textarea.value = textBefore + '• ' + textAfter;
    textarea.selectionStart = textarea.selectionEnd = cursorPosition;
  }
  
  // Salva o estado em tempo real no buffer da aba
  const current = appState.abas.find(a => a.id === appState.currentTabId);
  if(current) {
    current.conteudo = textarea.value;
    saveLocalStorage();
  }
}

/* CAIXA DE ENTRADA RÁPIDA DE CAPTURA DE ITENS */
function dispatchQuickInput() {
  const box = document.getElementById('quickBox');
  const txt = box.value.trim();
  if(!txt) return;
  
  const editor = document.getElementById('mainEditor');
  const formatado = `• ${txt}`;
  
  if(editor.value) {
    editor.value += `\n${formatado}`;
  } else {
    editor.value = formatado;
  }
  
  box.value = '';
  handleEditorInput(editor);
  editor.scrollTop = editor.scrollHeight; // Rola o editor pro final igual uma conversa
}

/* ==========================================================================
   COMPORTAMENTO DE ENVIO EXPEDIDO (PRESIONAR / CLIQUE CONTEXTUAL)
   ========================================================================== */
function setupContextMenus() {
  const editor = document.getElementById('mainEditor');
  const menu = document.getElementById('contextMenu');
  
  // Disparador simplificado para Desktop e Mobile através de clique com botão direito ou seleção prolongada
  editor.addEventListener('contextmenu', function(e) {
    const selection = window.getSelection().toString().trim() || getLineAtCursor(editor);
    if(selection && selection !== "•" && selection !== "-") {
      e.preventDefault();
      selectedLineText = selection.replace(/[•-]\s*/, ""); // Limpa marcadores
      
      menu.style.display = 'flex';
      menu.style.left = `${Math.min(e.clientX, window.innerWidth - 160)}px`;
      menu.style.top = `${Math.min(e.clientY, window.innerHeight - 220)}px`;
    }
  });

  // Fecha menu ao tocar fora
  document.addEventListener('click', function(e) {
    if(!menu.contains(e.target)) {
      menu.style.display = 'none';
    }
  });
}

function getLineAtCursor(textarea) {
  const text = textarea.value;
  const selStart = textarea.selectionStart;
  const startPos = text.lastIndexOf('\n', selStart - 1) + 1;
  let endPos = text.indexOf('\n', selStart);
  if (endPos === -1) endPos = text.length;
  return text.substring(startPos, endPos).trim();
}

function assignHorizon(horizonName) {
  // Converte a propriedade para o padrão camelCase do objeto state
  const key = horizonName.replace(/\s+/g, '');
  if(appState.horizontes[key] !== undefined) {
    appState.horizontes[key]++;
    appState.topbarMetrics.semData = Math.max(0, appState.topbarMetrics.semData - 1);
    
    // Atualiza contadores visuais superiores na hora
    if(horizonName === 'Hoje') appState.topbarMetrics.criticos++;
    if(horizonName === 'Semana') appState.topbarMetrics.importantes++;
    
    updateMetricsUI();
    saveLocalStorage();
    alert(`"${selectedLineText}" enviado para o horizonte: ${horizonName}`);
  }
  document.getElementById('contextMenu').style.display = 'none';
}

</script>

<!-- Importação Universal do Firebase (Compatível com HTMLPreview e Dispositivos Móveis) -->
<script>
(async function inicializarEcossistemaFirebase() {
  // 1. Força o carregamento sequencial dos scripts sem depender do HTMLPreview
  if (typeof firebase === 'undefined') {
    console.log("⚡ Carregando canais de nuvem de forma assíncrona...");
    await new Promise((resolve) => {
      const scriptApp = document.createElement('script');
      scriptApp.src = "https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js";
      scriptApp.onload = () => {
        const scriptFS = document.createElement('script');
        scriptFS.src = "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js";
        scriptFS.onload = resolve;
        document.head.appendChild(scriptFS);
      };
      document.head.appendChild(scriptApp);
    });
  }

  // 2. Configuração e Ativação das Credenciais
  const firebaseConfig = {
    apiKey: "AIzaSyBnOexg7KChfV2OsKBCDCuMCRT2xcAwKx8",
    authDomain: "painel-financeiro-borges.firebaseapp.com",
    projectId: "painel-financeiro-borges",
    storageBucket: "painel-financeiro-borges.firebasestorage.app",
    messagingSenderId: "354997627208",
    appId: "1:354997627208:web:90604d0a7dcd45b6e4eb7d"
  };

  const firebaseApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore(firebaseApp);
  const docRef = db.collection("fluxo_os").doc("dados_prioridades");

  // 3. Métodos Globais de Transmissão de Dados
  window.saveLocalStorage = async function() {
    try {
      await docRef.set(appState);
      console.log("☁️ Alteração enviada à nuvem!");
    } catch (e) {
      console.error("❌ Falha na sincronização do Firebase:", e);
    }
  };

  window.loadLocalStorage = function() {
    // Escuta ativa em tempo real multidispositivos
    docRef.onSnapshot((docSnap) => {
      if (docSnap.exists) {
        const cloudData = docSnap.data();
        const currentTabBackup = appState.currentTabId;
        
        appState = cloudData;
        
        if (currentTabBackup && appState.abas.some(a => a.id === currentTabBackup)) {
          appState.currentTabId = currentTabBackup;
        }
        
        // Atualiza a interface dinâmica da tela
        renderGithubCalendar();
        renderTabs();
        updateMetricsUI();
        
        // Sincroniza o editor sem interromper a digitação do cursor
        const editor = document.getElementById('mainEditor');
        const activeAba = appState.abas.find(a => a.id === appState.currentTabId);
        if (activeAba && editor.value !== activeAba.conteudo) {
          const start = editor.selectionStart;
          const end = editor.selectionEnd;
          editor.value = activeAba.conteudo;
          editor.setSelectionRange(start, end);
        }
      } else {
        console.log("Nenhum dado na nuvem. Gerando primeiro registro...");
        window.saveLocalStorage();
      }
    }, (error) => {
      console.error("Erro na escuta do Firestore:", error);
    });
  };

  // 4. Dá o start no fluxo com as funções mapeadas
  init();
})();
</script>
</body>
</html>
